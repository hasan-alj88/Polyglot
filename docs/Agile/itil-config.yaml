# ITIL Configuration for Polyglot Project
# Maintained by: Mai (Secretary)
# Last Updated: 2025-11-18

project:
  name: Polyglot
  repository: https://github.com/hasan-alj88/Polyglot
  ticket_prefix: PLG

# GitHub Issues Sync Configuration (for future use)
github_sync:
  enabled: false  # Set to true when gh CLI is installed
  sync_on_create: false
  sync_on_update: false
  label_mapping:
    incidents: "type: incident"
    problems: "type: problem"
    changes: "type: change"
    service_requests: "type: service-request"
  priority_labels:
    P1: "priority: P1-critical"
    P2: "priority: P2-high"
    P3: "priority: P3-medium"
    P4: "priority: P4-low"
    P5: "priority: P5-planning"
  status_labels:
    new: "status: new"
    assigned: "status: assigned"
    in_progress: "status: in-progress"
    pending: "status: pending"
    resolved: "status: resolved"
    closed: "status: closed"

# ITIL Priority Matrix (Impact × Urgency)
priority_matrix:
  # Impact: Critical, High, Medium, Low
  # Urgency: Immediate, High, Medium, Low

  critical_immediate: P1  # Blocker - entire project stopped
  critical_high: P1        # Blocker - major feature blocked
  critical_medium: P2      # High - critical feature affected
  critical_low: P3         # Medium - critical but not urgent

  high_immediate: P1       # Blocker - major impact, urgent
  high_high: P2            # High - major impact
  high_medium: P2          # High - significant impact
  high_low: P3             # Medium - high impact, low urgency

  medium_immediate: P2     # High - needs quick resolution
  medium_high: P3          # Medium - moderate impact
  medium_medium: P3        # Medium - normal priority
  medium_low: P4           # Low - minor impact

  low_immediate: P3        # Medium - low impact but urgent
  low_high: P4             # Low - minor issue
  low_medium: P4           # Low - can wait
  low_low: P5              # Planning - non-urgent improvement

# Priority Definitions
priorities:
  P1:
    name: Critical
    description: Blocking issue - immediate action required
    response_time: 1 hour
    resolution_target: 24 hours
    escalation: Notify hhj immediately

  P2:
    name: High
    description: Major impact - urgent resolution needed
    response_time: 4 hours
    resolution_target: 3 days
    escalation: Daily status updates

  P3:
    name: Medium
    description: Moderate impact - normal priority
    response_time: 1 day
    resolution_target: 1 week
    escalation: Weekly status updates

  P4:
    name: Low
    description: Minor impact - can be scheduled
    response_time: 3 days
    resolution_target: 2 weeks
    escalation: None

  P5:
    name: Planning
    description: Enhancement or future improvement
    response_time: 1 week
    resolution_target: As scheduled
    escalation: None

# Ticket Status Workflow
status_workflow:
  incident:
    states: [new, assigned, in_progress, resolved, closed]
    transitions:
      new: [assigned, closed]
      assigned: [in_progress, new]
      in_progress: [resolved, assigned, pending]
      pending: [in_progress, resolved]
      resolved: [closed, in_progress]
      closed: []  # Terminal state

  problem:
    states: [new, assigned, investigating, root_cause_found, resolved, closed]
    transitions:
      new: [assigned, closed]
      assigned: [investigating]
      investigating: [root_cause_found, assigned]
      root_cause_found: [resolved]
      resolved: [closed, investigating]
      closed: []  # Terminal state

  change:
    states: [new, assessment, approval_pending, approved, scheduled, in_progress, completed, closed]
    transitions:
      new: [assessment]
      assessment: [approval_pending, new]
      approval_pending: [approved, assessment, rejected]
      approved: [scheduled]
      rejected: [closed]
      scheduled: [in_progress]
      in_progress: [completed, scheduled]
      completed: [closed]
      closed: []  # Terminal state

  service_request:
    states: [new, assigned, in_progress, completed, closed]
    transitions:
      new: [assigned, closed]
      assigned: [in_progress]
      in_progress: [completed, assigned]
      completed: [closed]
      closed: []  # Terminal state

# Assignment Groups (Agent Roles)
assignment_groups:
  development:
    lead: Amelia (Dev Agent)
    members: [Amelia]
    responsibilities: [implementation, coding, testing]

  architecture:
    lead: Winston (Architect)
    members: [Winston]
    responsibilities: [design, technical decisions, system architecture]

  documentation:
    lead: Paige (Tech Writer)
    members: [Paige]
    responsibilities: [documentation, writing, formatting]

  creative:
    lead: Carson (Brainstorming Coach)
    members: [Carson]
    responsibilities: [brainstorming, ideation, syntax design]

  project_management:
    lead: Bob (Scrum Master)
    members: [Bob]
    responsibilities: [sprint planning, story creation, coordination]

  quality_assurance:
    lead: Murat (Test Architect)
    members: [Murat]
    responsibilities: [testing strategy, quality gates, test design]

  operations:
    lead: Mai (Secretary)
    members: [Mai]
    responsibilities: [record keeping, meeting minutes, tracking]

# Ticket Categories
categories:
  incidents:
    - syntax_error
    - documentation_error
    - broken_link
    - inconsistency
    - blocking_issue

  problems:
    - syntax_ambiguity
    - design_conflict
    - architectural_concern
    - recurring_incident

  changes:
    - syntax_modification
    - architecture_change
    - process_improvement
    - tool_addition

  service_requests:
    - documentation_request
    - example_creation
    - brainstorming_session
    - review_request

# SLA Exclusions
sla_exclusions:
  - waiting_on_user_input
  - waiting_on_external_dependency
  - deferred_by_design
  - blocked_by_other_ticket

# Reporting
reports:
  daily:
    - open_p1_count
    - open_p2_count
    - tickets_opened_today
    - tickets_resolved_today

  weekly:
    - tickets_by_priority
    - tickets_by_status
    - tickets_by_assignment_group
    - sla_compliance_rate
    - aging_tickets

  monthly:
    - trend_analysis
    - problem_patterns
    - backlog_health

# Ticket ID Format
ticket_id_format:
  incident: INC-YYYY-NNN      # INC-2025-001
  problem: PRB-YYYY-NNN       # PRB-2025-001
  change: CHG-YYYY-NNN        # CHG-2025-001
  service_request: SR-YYYY-NNN # SR-2025-001

# Auto-numbering (current counters)
counters:
  incident: 1    # INC-2025-001 created
  problem: 2     # PRB-2025-001, PRB-2025-002 created
  change: 0
  service_request: 3  # SR-2025-001, SR-2025-002, SR-2025-003 created
