# Problem Ticket - Undocumented Syntax Features

ticket_id: PRB-2025-002
type: problem
title: "Undocumented Syntax Features - [^], [?], Exhaustive Matching"
description: |
  ROOT CAUSE INVESTIGATION: Multiple syntax features are used in documentation but not fully specified.

  BLOCKING Story 1.2 (lexer) because lexer needs complete block marker and operator list.

  Undocumented Features:
  1. [^] line continuation block marker
     - Used in examples but not in language/06-block-markers.md
     - Syntax: [^] >"text" for multiline strings

  2. [?] switch/conditional system
     - Partially documented but incomplete
     - Missing: exhaustive matching compiler rules
     - Missing: Default catchall pattern syntax

  3. ?> match operator
     - Used throughout but not comprehensively documented
     - Syntax: .variable ?> pattern

  4. .. range operator
     - Used but not fully specified
     - Syntax: .value.., ...value, N..M

  5. Exhaustive pattern matching
     - Compiler enforces total probability = 1
     - Not documented anywhere

  6. Multiline string continuation
     - Conflicting info: >" vs >""
     - Need authoritative syntax

  IMPACT: Lexer cannot be built without complete block marker and operator lists.

  ASSIGNED TO: Carson (Brainstorming Coach)
  (Already added as brainstorming-backlog.md item #6)

