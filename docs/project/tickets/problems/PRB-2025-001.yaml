# Investigation
investigation:
  hypothesis: |
    Comparison operators were initially planned but later deprecated in favor of:
    1. Range notation (.value.., ...value, .value) with ?> operator
    2. Explicit named operations (|U.String.IsEmpty, |Q.DispatchIf.RAM.MoreThan)

    Documentation was not updated consistently, leading to 12 violations.
  evidence:
    - "Nov 13 audit explicitly says comparison operators DON'T exist"
    - "code-violations-log.md suggests they exist but are discouraged"
    - "No comprehensive documentation of comparison operators in language/05-operators.md"
    - "Range notation and ?> operator are documented as alternatives"
  experiments:
    - "Review all operator documentation to find authoritative source"
    - "Check if lexer implementation references exist for comparison operators"
    - "Consult with hhj for authoritative decision"

# Root Cause Analysis
root_cause:
  description: |
    Comparison operators DO EXIST in Polyglot but were not comprehensively documented.

    Original hypothesis was partially correct - operators were being designed but documentation
    was incomplete. Nov 13 audit incorrectly stated they don't exist.

    ROOT CAUSE: Lack of comprehensive operator specification during v0.0.2 development.
  category: documentation_gap
  contributing_factors:
    - "Incomplete migration from v0.0.1 to v0.0.2"
    - "No single authoritative operator reference"
    - "Conflicting guidance in audit vs violations log"
    - "Syntax still being finalized during documentation phase"

# Resolution
resolution: |
  RESOLVED via Carson's brainstorming session on 2025-11-18.

  DECISION: Comparison operators DO EXIST in Polyglot.

  Complete operator family defined with '?' suffix pattern:
  - Comparison: >?, <?, =>?, =<?, =?, =!?
  - Range (interval notation): ?[a,b], ?(a,b), ?[a,b), ?(a,b]
  - Pattern matching: *? (wildcard), re? (regex)
  - Boolean logic: [&], [+], [-], [^], [.]

  All operators comprehensively documented in session document:
  docs/project/agent-sessions/carson-2025-11-18-comparison-operators-design.md

  16 design decisions recorded, type compatibility matrix established,
  exhaustive matching rules defined.

  DEPRECATED: ?> operator, .. range operator, Default keyword

  Story 1.2 UNBLOCKED - lexer can now be implemented with complete operator list.
