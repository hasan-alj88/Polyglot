# Problem Ticket - Comparison Operators Ambiguity

ticket_id: PRB-2025-001
type: problem
title: "Comparison Operators Ambiguity - Do They Exist in Polyglot?"
description: |
  ROOT CAUSE INVESTIGATION: Conflicting documentation about comparison operator existence.

  QUESTION: Do comparison operators (==, !=, <, >, <=, >=) exist in Polyglot?

  Evidence FOR existence:
  - code-violations-log.md Violation #7 says they exist but prefers named operations
  - language/02-type-system.md line 143 lists them
  - 12 instances used throughout v0.0.2 documentation

  Evidence AGAINST existence:
  - Nov 13 audit report says they DON'T exist
  - Recommends using range notation exclusively: .value.., ...value, .value
  - Philosophy: Explicit named operations over implicit operators

  IMPACT: Cannot implement Story 1.2 (lexer) without knowing ALL valid operators.

  DECISION NEEDED:
  1. Do comparison operators exist? YES/NO
  2. If YES: Document them comprehensively, add to lexer tokens
  3. If NO: Fix all 12 violations using range notation

  ASSIGNED TO: Carson (Brainstorming Coach) - Add to brainstorming backlog
  (Already added as brainstorming-backlog.md item #4)

