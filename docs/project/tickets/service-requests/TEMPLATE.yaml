# Service Request Ticket Template
# Copy this file and rename to SR-YYYY-NNN.yaml

ticket_id: SR-2025-001
type: service_request
title: "Brief description of the service request"
description: |
  Detailed description of the request.
  What service is being requested?
  What is the desired outcome?

# Priority Calculation
impact: medium          # critical, high, medium, low
urgency: medium         # immediate, high, medium, low
priority: P3            # Auto-calculated from impact × urgency matrix

# Status and Assignment
status: new             # new, assigned, in_progress, completed, closed
assigned_to: null       # Agent name or null if unassigned
assigned_group: null    # development, architecture, documentation, creative, project_management, quality_assurance, operations

# Categorization
category: documentation_request  # documentation_request, example_creation, brainstorming_session, review_request

# Request Details
request_details:
  service_type: null    # What type of service?
  deliverables: []      # What will be delivered?
  acceptance_criteria: [] # How to verify completion?

# Related Information
related_tickets: []     # Related tickets
related_files: []       # Files involved
related_stories: []     # Stories related to this request
related_epics: []       # Epics related to this request

# GitHub Sync (for future use)
github:
  issue_number: null    # GitHub issue # (null if not synced)
  url: null             # Full GitHub issue URL
  last_synced: null     # ISO timestamp of last sync

# Timeline
created_date: 2025-11-18
created_by: Mai (Secretary)
assigned_date: null
started_date: null
completed_date: null
closed_date: null

# Fulfillment
fulfillment:
  work_notes: null      # Notes about fulfilling the request
  deliverables_provided: []
  verified_by: null
  verification_date: null

# Resolution
resolution: null        # How the request was fulfilled
satisfaction: null      # Requester satisfaction (satisfied, neutral, dissatisfied)

# SLA Tracking
sla:
  response_due: 2025-11-19T12:00:00Z    # Based on priority
  resolution_due: 2025-11-25T12:00:00Z  # Based on priority
  breached: false
  exclusion_reason: null

# Notes and Updates
notes:
  - timestamp: 2025-11-18T12:00:00Z
    author: Mai (Secretary)
    note: "Service request created"

# Metadata
tags: []
watchers: [hhj]
requester: hhj
