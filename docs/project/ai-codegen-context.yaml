# Polyglot AI Code Generation Context
# Version: 0.0.2
# Last Updated: 2025-11-24
# Purpose: AI-optimized reference for generating valid Polyglot code
# Audience: AI code generators (not human documentation)
# Must comply with: All .md documentation in /docs/user/
# Variable State Model: docs/VARIABLES-DOCUMENTATION-INDEX.md

---

# ============================================================================
# CORE PHILOSOPHY
# ============================================================================

language_identity:
  purpose: "Orchestration and automation language - NOT general-purpose programming"
  motto: "Don't Reinvent the Wheel - Use Battle-Tested Code"
  use_cases:
    - "Coordinate Python/Rust/C++ code"
    - "Schedule automated workflows"
    - "Event-driven pipelines"
    - "Cross-language integration"
    - "System automation glue"

  NOT_for:
    - "Implementing algorithms"
    - "Data structure manipulation"
    - "Complex business logic"
    - "Mathematical calculations"
    - "String/array transformations"

design_principles:
  async_centric:
    rule: "Polyglot is async-centric, not sync with async bolted on"
    implications:
      - "Variables transition through states (Declared → Pending → Ready)"
      - "Runtime automatically waits for Pending variables (no await keyword)"
      - "Once Ready, variables are immutable as consequence of async coordination"
      - "Faulted state for error handling"
    core_insight: "Immutability is a CONSEQUENCE, not the design goal"

  orchestrate_not_implement:
    rule: "Delegate ALL logic to Python/Rust/C++ - Polyglot only coordinates"
    max_pipeline_length: "~20 lines of orchestration logic"

  type_safe_schemas:
    rule: "Prefer #Enumeration over pg\\serial for known schemas"
    decision_tree: |
      Does schema change at runtime?
        NO  → Use #Enumeration (type-safe, state-aware)
        YES → Use pg\\serial (dynamic, discouraged)

  minimal_transformation:
    rule: "If you're doing complex logic in Polyglot, STOP and delegate"

  leverage_libraries:
    rule: "Use existing Python/Rust/C++ libraries, never reimplement"

# ============================================================================
# CRITICAL SYNTAX CONSTRAINTS
# ============================================================================

syntax_rules:
  ASYNC_CENTRIC_STATE_MODEL:
    rule: "Variables transition through states in async-centric coordination"

    state_lifecycle: |
      Declared → DefaultReady → Ready (immutable)
               ↓             ↓
              Pending ────→ Ready (immutable)
               ↓
             Faulted (error)

    five_core_states:
      declared:
        state: "Declared"
        enum: "#Variables.States.Declared"
        description: "Schema defined, no value, no default"
        can_read_value: false
        can_be_used_at_i_block: false
        syntax: "[<] .field: Type"

      default_ready:
        state: "DefaultReady"
        enum: "#Variables.States.DefaultReady"
        description: "Has default value, allows ONE override before immutable"
        can_read_value: true
        can_be_used_at_i_block: true
        syntax: "[<] .field: Type <~ default_value"
        critical_rule: "Can be overridden ONCE, then becomes Ready"

      pending:
        state: "Pending"
        enum: "#Variables.States.Pending"
        description: "Async operation in progress"
        can_read_value: false
        can_be_used_at_i_block: false
        automatic_waiting: "Runtime waits automatically - NO await keyword"

      ready:
        state: "Ready"
        enum: "#Variables.States.Ready"
        description: "Has value, immutable forever"
        can_read_value: true
        can_be_used_at_i_block: true
        immutable: true

      faulted:
        state: "Faulted"
        enum: "#Variables.States.Faulted"
        description: "Operation failed, check .errors field"
        can_read_value: false
        can_be_used_at_i_block: false
        error_handling: "Use .errors field and [!] blocks"

    four_queue_states:
      note: "Compiler concern, users don't need to know"
      states: ["Retrying", "Paused", "Cached", "Dirty"]

    reserved_fields:
      state_field:
        syntax: ".variable.state"
        type: "#Variables.States.*"
        usage: "Query current state for control flow"
        example: "[?] .var.state =? #Variables.States.Ready"

      errors_field:
        syntax: ".variable.errors"
        type: "pg\\array{!}"
        usage: "Access error details when Faulted"
        example: "[<] .errors << .var.errors"

    three_assignment_operators:
      schema_only:
        operators: "None (just type declaration)"
        state: "Declared"
        syntax: "[<] .field: Type"
        usage: "No default, must be populated later"
        example: "[<] .name: pg\\string"

      default_assignment:
        operators: "<~ (receive default) or ~> (send default)"
        state: "DefaultReady"
        syntax: "[<] .field: Type <~ default"
        usage: "Provides default, allows ONE override"
        override_semantics: "First override transitions to Ready (immutable)"
        bidirectional: true
        examples:
          receive: "[<] .timeout: pg\\int <~ 30"
          send: "[>] .timeout: pg\\int ~> .config_timeout"

      constant_async:
        operators: "<< (receive) or >> (send)"
        state: "Ready (constant) or Pending (async)"
        syntax_constant: "[<] .field: Type << constant_value"
        syntax_async: "[>] .field: Type >> .destination"
        usage: "Immutable values or async operations"
        bidirectional: true
        examples:
          constant: '[<] .message: pg\\string << "Hello"'
          async_send: "[>] .result: pg\\string >> .output"
          async_receive: "[<] .input: pg\\string << .async_result"

    i_block_semantics:
      rule: "[i] blocks expect Ready or DefaultReady variables"
      automatic_waiting: "Runtime waits for Pending variables automatically"
      forbidden: "Cannot use Declared or Faulted variables at [i]"
      example: |
        [i] .config: #Config << #Config   # DefaultReady fields kick in
        [i] .user_id: pg\\string            # Must be Ready when pipeline triggers

  variable_assignment_direction:
    critical_rule: "Pay strict attention to << and >> direction"

    receive_operator: "<<"
    receive_usage: ".destination << .source_value"
    receive_danger: |
      FORBIDDEN: Receiving from uninitialized variable
      BAD:  [<] .new_var: pg\string << .uninitialized_var
      WHY:  .uninitialized_var may not have a value yet

      ACCEPTABLE: Receiving from initialized variable
      OK:   [<] .new_var: pg\string << .existing_var
      WHEN: .existing_var already has a value

    send_operator: ">>"
    send_usage: ".source_value >> .new_destination"
    send_rule: |
      ALWAYS SAFE: Creating new variable from existing value
      OK:   [>] .result: pg\string >> .new_var
      WHY:  .new_var is created and receives the value
      NOTE: .new_var will naturally have the same type as .result

  data_type_vs_pipeline_call:
    critical_distinction: "lang\\type patterns are DATA TYPES, NOT pipeline calls"

    data_types_not_callable:
      - "pg\\string (not pg\\string.uppercase())"
      - "pg\\array{T} (not pg\\array.Append())"
      - "pg\\int (not pg\\int.add())"
      - "lang.mutable\\type (not lang.mutable\\type.method())"

    only_valid_inline_calls:
      string_literals:
        - 'String.Upper"text"'
        - 'String.Lower"text"'
        - 'String.Trim"text"'
        - 'String.Length"text"'
      datetime_literals:
        - 'DT"2025-11-22 14:30:00"'
        - 'T"1:30:00"'
      other_literals:
        - 'sql"SELECT * FROM table"'

    everything_else_is_pipeline:
      rule: "All other operations MUST be pipeline calls"
      syntax: "|PipelineName or @Package|PipelineName"
      examples:
        - "[r] |transform_data"
        - "[r] @DB|ExecuteQuery"
        - "[r] |U.Array.Map"

  array_operators:
    special_case: "Array operators start with ~ and declare + assign simultaneously"
    usage: "Used for collection operations that need to maintain immutability"
    example: "[r] ~ForEach"
    note: "Operators (~) are different from pipeline calls (|)"

  undefined_pipeline_calls:
    forbidden: "Do NOT call pipelines that are not defined"
    exceptions:
      - "Imported package pipelines: @ImportAlias|PipelineName"
      - "Standard library utilities: |U.Log.Info"
      - "Pretend/example imports in documentation"

    bad_example: "[r] |UndefinedPipeline  # Not imported, not defined"
    good_example: "[r] @DB|ExecuteQuery  # Imported package"

syntax_rules:
  scope_definition:
    method: "Block markers ONLY"
    absolutely_forbidden:
      - "Curly braces {} for scope"
      - "Indentation-based scope"
      - "Parentheses () for grouping"
      - "Function signatures func(.param) -> .result"

  comments:
    single_line:
      syntax: "//"
      usage: "// This is a comment"
      note: "Forward slash, NOT backslash"

    multi_line:
      syntax: "/* */"
      usage: "/* This is a multi-line comment */"
      formatted: |
        /*
         * Multi-line comment
         * with multiple lines
         */

    critical_distinction: "Forward slash (/) for comments, backslash (\\) for types"
    examples:
      correct: "// Comment | pg\\int (type)"
      wrong: "\\\\ Comment (NOT valid)"

  keywords:
    count: 0
    forbidden_words:
      - "if"
      - "else"
      - "for"
      - "while"
      - "return"
      - "try"
      - "catch"
      - "function"
      - "def"
      - "class"
      - "import"
      - "from"

  variables:
    mandatory_prefix: "."
    applies_to: "ALL contexts without exception"
    examples:
      declaration: ".name: pg\\string << \"value\""
      reference: ".result << .name"
      assignment: "[>] .output >> .variable"
      interpolation: "\"Hello {.name}\""
      field_access: ".user.email"

    forbidden:
      - "name: pg\\string"
      - ".result << name"
      - "\"Hello {name}\""

  line_structure:
    absolute_rule: "EVERY line MUST start with a block marker [marker]"
    no_exceptions: true
    no_bare_statements: true

# ============================================================================
# BLOCK MARKERS REFERENCE
# ============================================================================

block_markers:

  # Pipeline Structure
  pipeline_def:
    start: "[|]"
    end: "[X]"
    pattern: "[|] PipelineName\n...\n[X]"

  # Declarations
  declarations:
    input:
      marker: "[i]"
      syntax: "[i] .name: Type"
      location: "After [|], before operations"

    output:
      marker: "[o]"
      syntax: "[o] .name: Type"
      location: "After operations, before [X]"

    trigger:
      marker: "[t]"
      syntax: "[t] |T.TriggerType or [t] T.Type\"value\""
      location: "After [|], before operations"

  # Macro Unwrap
  macro_unwrap:
    marker: "[W]"
    case: "ALWAYS UPPERCASE"
    never: "[w]"
    applies_to:
      - "Runtime wrappers: [W] |W.Python3.11"
      - "Standard macros: [W] |W.NoSetup.NoCleanup"
      - "ALL macro unwraps"
    examples:
      - "[W] |W.Python3.11"
      - "[W] |W.Rust"
      - "[W] |W.NoSetup.NoCleanup"

  # Operations
  operations:
    run_sequential:
      marker: "[r]"
      usage: "Execute operation sequentially"
      implicit_children: ["[<]", "[>]"]

    run_parallel:
      marker: "[p]"
      usage: "Execute operation in parallel"
      implicit_children: ["[<]", "[>]"]

    input_to_operation:
      marker: "[<]"
      syntax: "[<] .param: Type << .source_value"
      context: "Implicit child of [r]/[p], OR explicit in enumerations/joins"

    output_from_operation:
      marker: "[>]"
      syntax: "[>] .output_name >> .destination_variable"
      context: "Implicit child of [r]/[p]"

  # Control Flow
  conditional:
    marker: "[?]"
    operators: ["=?", ">?", "<?", ">=?", "<=?", "!=?"]
    exhaustiveness: "MANDATORY"
    catchall: "[?] *?"
    pattern: |
      [?] condition1
      [~]operations for condition1
      [~][o] result1

      [?] condition2
      [~]operations for condition2
      [~][o] result2

      [?] *?                    # REQUIRED
      [~]operations for all other cases
      [~][o] default_result

  # Nesting
  nesting:
    explicit_nest:
      marker: "[~]"
      when_required:
        - "Operations inside [p] parallel blocks"
        - "Operations inside [?] conditional blocks"
        - "Operations inside [!] error handlers"
        - "ForEach loop bodies"
        - "Any operation WITHIN expanded contexts"

      when_NOT_required:
        - "[<] and [>] directly after [r] or [p] (implicit children)"

    double_nest:
      marker: "[~][~]"
      when_required:
        - "Operations WITHIN error catch blocks"
        - "Nested operations inside nested contexts"

      pattern: |
        [r] |MightFail
        [~]
        [~][!] !ErrorType
        [~][>] .msg >> .error_message
        [~][~][r] |HandleError        # [~][~] = nested WITHIN catch
        [~][~][<] .message << .error_message
        [~][~]
        [~][~][o] !ErrorType

  # Error Handling
  error_catch:
    marker: "[!]"
    context: "Within [~] after operation"
    pattern: "[~][!] !ErrorType"
    children_require: "[~][~]"

  # Synchronization
  join:
    marker: "[Y]"
    usage: "Join parallel operations"
    direction: "Uses [<] to PROVIDE variables (NOT [>])"
    pattern: |
      [p] |ProcessA
      [>] .result >> .result_a

      [p] |ProcessB
      [>] .result >> .result_b

      [Y] |Y.Join
      [<] .result_a              # [<] provides TO join
      [<] .result_b

  # Enumeration Definition
  enumeration:
    marker: "[#]"
    location: "File scope (before pipelines)"

    simple_variants:
      pattern: |
        [#] EnumerationName
        [<] .VariantName
        [<] .AnotherVariant
        [X]

      usage: "#EnumerationName.VariantName"

    with_fields:
      pattern: |
        [#] RecordType
        [<] .field_name: Type << default_value
        [<] .another_field: Type << default_value
        [X]

# ============================================================================
# TYPE SYSTEM
# ============================================================================

types:
  primitives:
    string: "pg\\string"
    integer: "pg\\int"
    float: "pg\\float"
    boolean: "pg\\bool"
    path: "pg\\path"
    datetime: "pg\\dt"
    duration: "pg\\time"

  collections:
    array: "pg\\array{ElementType}"
    set: "pg\\set{ElementType}"
    examples:
      - "pg\\array{pg\\string}"
      - "pg\\array{#UserProfile}"
      - "pg\\set{pg\\int}"

  mutable_discouraged:
    serial:
      type: "pg\\serial"
      usage: "ONLY for truly dynamic/unknown schemas"
      prefer_instead: "#Enumeration for known schemas"
      when_acceptable:
        - "External API with unknown structure"
        - "Generic key-value store"
        - "Truly schemaless data"

  enumerations:
    purpose: "Type-safe, state-aware data structures"

    definition_rules:
      - "Define at file scope BEFORE first use"
      - "Simple variants: [<] .VariantName"
      - "Field variants with defaults: [<] .field: Type <~ default"
      - "Field variants constant: [<] .field: Type << constant"
      - "Field variants schema-only: [<] .field: Type"
      - "Close with [X]"

    usage: "#EnumName.VariantName"

    field_access: ".variable.field_name"

    field_state_semantics:
      default_field:
        syntax: "[<] .timeout: pg\\int <~ 30"
        state: "DefaultReady"
        behavior: "Uses 30 unless overridden once"

      constant_field:
        syntax: "[<] .version: pg\\string << \"1.0.0\""
        state: "Ready"
        behavior: "Always \"1.0.0\", cannot override"

      schema_field:
        syntax: "[<] .user_id: pg\\string"
        state: "Declared"
        behavior: "Must be populated when creating instance"

  reserved_enumerations:
    boolean:
      full_name: "#Boolean"
      variants: ["#Boolean.True", "#Boolean.False"]
      aliases: ["#True", "#False"]

    none:
      name: "#None"
      usage: "Empty input/output in pipelines"
      example: "[i] #None"

    variable_states:
      full_name: "#Variables.States"
      purpose: "Introspect variable state for control flow"
      core_variants:
        - "#Variables.States.Declared"
        - "#Variables.States.DefaultReady"
        - "#Variables.States.Pending"
        - "#Variables.States.Ready"
        - "#Variables.States.Faulted"
      queue_variants:
        - "#Variables.States.Retrying"
        - "#Variables.States.Paused"
        - "#Variables.States.Cached"
        - "#Variables.States.Dirty"
      usage_example: |
        [?] .data.state =? #Variables.States.Ready
        [~][r] |ProcessData

        [?] .data.state =? #Variables.States.Faulted
        [~][r] |HandleError
        [~][<] .errors << .data.errors

# ============================================================================
# SPECIAL SYNTAX PATTERNS
# ============================================================================

special_syntax:

  string_literal_pipelines:
    purpose: "Built-in string operations via literal syntax"
    pattern: 'Operation"{value}"'
    NOT_method_calls: true

    operations:
      uppercase: 'String.Upper"{.input}"'
      lowercase: 'String.Lower"{.input}"'
      trim: 'String.Trim"{.input}"'
      length: 'String.Length"{.input}"'

    note: "Implementation comes AFTER lexer/compiler (Epic 3+)"

  sql_literals:
    syntax: 'sql"SELECT * FROM {.table}"'
    interpolation: "Supports {.variable} interpolation"
    example: '[<] .query: pg\\string << sql"SELECT * FROM {.table_name}"'

  trigger_literals:
    cron:
      syntax: 'T.Cron"schedule"'
      no_pipe: true
      example: '[t] T.Cron"0 2 * * *"'

    datetime:
      syntax: 'DT"YYYY-MM-DD HH:MM:SS"'
      example: '[<] .start: pg\\dt << DT"2025-11-22 14:30:00"'

    duration:
      syntax: 'T"HH:MM:SS"'
      example: '[<] .timeout: pg\\time << T"1:30:00"'

  foreach:
    operation: "~ForEach"
    pattern: |
      [r] ~ForEach
      [<] .collection
      [>] .current_item
      [~][r] .processed: Type << Operation"{.current_item}"
      [~][o] !NoError

# ============================================================================
# PACKAGE MANAGEMENT
# ============================================================================

packages:
  declaration:
    syntax: "[@] Registry@Package:Version"
    example: "[@] Local@MyApp:1.0.0"
    location: "Start of file"

  file_numbering:
    syntax: "[#] FileNumber"
    example: "[#] 1"
    context: "After [@] declaration"

  imports:
    syntax: "[<] @Alias << Registry@Package:Version"
    example: "[<] @DB << Community@Database:2.0.0"
    location: "Inside [@]...[X] block"

  cross_package_usage:
    pipeline_call: "@Alias|PipelineName"
    enumeration: "@Alias#Enumeration.Variant"
    error_type: "@Alias!ErrorType"

  example_structure: |
    [@] Local@MyApp:1.0.0
    [#] 1
    [<] @DB << Community@Database:2.0.0
    [<] @Email << Community@EmailService:3.1.0
    [X]

    [|] MyPipeline
    [r] @DB|FetchData
    [r] @Email|SendNotification
    [X]

# ============================================================================
# STANDARD LIBRARY PATTERNS
# ============================================================================
# Note: Implementation AFTER Epic 2 (lexer complete)

stdlib:
  file_operations:
    read: "|U.File.Text.Read"
    write: "|U.File.Text.Write"
    append: "|U.File.Text.AppendLine"

  csv_operations:
    to_rows: "|U.CSV.To.Rows"
    from_rows: "|U.CSV.From.Rows"

  database_operations:
    query: "|U.DB.Query"
    execute: "|U.DB.Execute"
    fetch_schema: "|U.DB.TargetSchema.Fetch"

  logging:
    error: "|U.Log.Error"
    info: "|U.Log.Info"
    warn: "|U.Log.Warn"
    debug: "|U.Log.Debug"

error_types:
  success: "!NoError"

  filesystem:
    - "!pg.FileSystem.NotFound"
    - "!pg.FileSystem.PermissionDenied"

  network:
    - "!pg.Network.ConnectionFailed"
    - "!pg.Network.Timeout"

  database:
    - "!pg.Database.QueryFailed"
    - "!pg.Database.ConnectionFailed"

# ============================================================================
# CODE GENERATION TEMPLATES
# ============================================================================

templates:

  minimal_pipeline:
    use_case: "Simplest valid pipeline"
    code: |
      [|] MinimalPipeline
      [i] #None
      [t] |T.Call
      [W] |W.NoSetup.NoCleanup
      [r] |DoSomething
      [o] #None
      [X]

  pipeline_with_input_output:
    use_case: "Transform data with Python"
    code: |
      [|] TransformData
      [i] .input: pg\\string
      [t] |T.Call

      [W] |W.Python3.11

      [r] |transform_data
      [<] .data: pg\\string << .input
      [>] .result: pg\\string >> .output

      [o] .output: pg\\string
      [X]

  scheduled_automation:
    use_case: "Daily cron job orchestrating multiple languages"
    code: |
      [|] DailyDataSync
      [i] #None

      [t] T.Cron"0 2 * * *"

      [W] |W.Python3.11

      [r] |fetch_source_data
      [>] .data: pg\\array{pg\\string} >> .source_data

      [r] |transform_data
      [<] .input: pg\\array{pg\\string} << .source_data
      [>] .output: pg\\array{pg\\string} >> .transformed

      [r] |save_to_database
      [<] .records: pg\\array{pg\\string} << .transformed
      [>] .count: pg\\int >> .saved_count

      [o] #None
      [X]

  exhaustive_conditional:
    use_case: "Switch statement with required catchall"
    code: |
      [?] .status =? "active"
      [~][r] |ProcessActive
      [~][o] !NoError

      [?] .status =? "inactive"
      [~][r] |ProcessInactive
      [~][o] !NoError

      [?] *?                    # REQUIRED catchall
      [~][r] |HandleUnknown
      [~][o] !NoError

  parallel_execution:
    use_case: "Parallel operations with join"
    code: |
      [p] |FetchFromAPI
      [<] .endpoint: pg\\string << .api_url
      [>] .data >> .api_data

      [p] |FetchFromDatabase
      [<] .query: pg\\string << .sql_query
      [>] .records >> .db_data

      [Y] |Y.Join
      [<] .api_data
      [<] .db_data

      [r] |MergeResults
      [<] .source_a: pg\\serial << .api_data
      [<] .source_b: pg\\serial << .db_data
      [>] .merged >> .final_result

  error_handling:
    use_case: "Operation with error handling"
    code: |
      [r] |ReadFile
      [<] .path: pg\\path << .file_path
      [>] .content: pg\\string >> .file_content
      [~]
      [~][!] !pg.FileSystem.NotFound
      [~][>] .message: pg\\string >> .err_msg
      [~][~][r] |U.Log.Error
      [~][~][<] .msg: pg\\string << "File not found: {.err_msg}"
      [~][~]
      [~][~][o] !pg.FileSystem.NotFound

  enumeration_usage:
    use_case: "Define and use custom enumeration with defaults"
    code: |
      [@] Local@MyApp:1.0.0
      [#] 1
      [X]

      [#] UserStatus
      [<] .Active
      [<] .Inactive
      [<] .Suspended
      [X]

      [#] UserProfile
      [<] .user_id: pg\\string                    # Schema-only, must populate
      [<] .email: pg\\string                      # Schema-only, must populate
      [<] .status: #UserStatus <~ #UserStatus.Active  # Default Active
      [<] .created_at: pg\\dt <~ DT"2025-01-01 00:00:00"
      [X]

      [|] ProcessUser
      [i] .user: #UserProfile      # DefaultReady fields have defaults

      [t] |T.Call
      [W] |W.NoSetup.NoCleanup

      [?] .user.status =? #UserStatus.Active
      [~][r] |GrantAccess
      [~][o] !NoError

      [?] *?
      [~][r] |DenyAccess
      [~][o] !NoError

      [o] #None
      [X]

# ============================================================================
# ANTI-PATTERNS (FORBIDDEN)
# ============================================================================

anti_patterns:

  curly_braces_scope:
    forbidden: |
      [r] |ProcessData {
          [<] .input
      }
    correct: |
      [r] |ProcessData
      [<] .input

  function_signatures:
    forbidden: "func ProcessData(.input: pg\\string) -> pg\\string"
    correct: |
      [|] ProcessData
      [i] .input: pg\\string
      [o] .result: pg\\string
      [X]

  keywords:
    forbidden: "if .age > 18"
    correct: "[?] .age >? 18"

  indentation_scope:
    forbidden: |
      [?] .valid
          [r] |Process
    correct: |
      [?] .valid
      [~][r] |Process

  variables_no_dot:
    forbidden: "[r] .result << name"
    correct: "[r] .result << .name"

  method_call_syntax:
    forbidden: 'pg\\string.uppercase(.input)'
    correct: 'String.Upper"{.input}"'

  non_exhaustive_switch:
    forbidden: |
      [?] .status =? "active"
      [~][r] |Process
      # Missing catchall!
    correct: |
      [?] .status =? "active"
      [~][r] |ProcessActive
      [~][o] !NoError

      [?] *?                    # Required!
      [~][r] |HandleOther
      [~][o] !NoError

  undefined_enumeration:
    forbidden: |
      [#] User
      [<] .status: #UserStatus    # Not defined!
      [X]
    correct: |
      [#] UserStatus
      [<] .Active
      [X]

      [#] User
      [<] .status: #UserStatus
      [X]

  lowercase_wrapper:
    forbidden: "[w] |W.Python3.11"
    correct: "[W] |W.Python3.11"

  join_wrong_direction:
    forbidden: |
      [Y] |Y.Join
      [>] .result_a
    correct: |
      [Y] |Y.Join
      [<] .result_a

  implementing_in_polyglot:
    forbidden: |
      [r] .result: pg\\array{pg\\string} << pg\\array.new()
      [r] ~ForEach
      [<] .items
      [>] .item
      [~][r] .upper << String.Upper"{.item}"
      [~][r] .result << Array.Append"{.result}, {.upper}"

    correct: |
      [W] |W.Python3.11
      [r] |transform_to_uppercase
      [<] .items: pg\\array{pg\\string} << .items
      [>] .result: pg\\array{pg\\string} >> .uppercase_items

  using_serial_for_known_schema:
    forbidden: |
      [r] |FetchUser
      [>] .user: pg\\serial >> .user_data

    correct: |
      [#] UserProfile
      [<] .id: pg\\string << ""
      [<] .email: pg\\string << ""
      [X]

      [r] |FetchUser
      [>] .user: #UserProfile >> .user_data

  receiving_from_uninitialized_variable:
    forbidden: |
      [<] .new_var: pg\\string << .uninitialized_var
      # ERROR: .uninitialized_var may not have a value yet

    correct: |
      # Option 1: Receive from initialized variable
      [<] .new_var: pg\\string << .existing_var

      # Option 2: Create via send operator
      [>] .result: pg\\string >> .new_var

  treating_types_as_callable:
    forbidden: |
      [r] .items: pg\\array{pg\\string} << pg\\array.from_list(["a", "b"])
      # ERROR: pg\\array is a TYPE, not a pipeline

    correct: |
      [W] |W.Python3.11
      [r] |create_array_from_list
      [<] .values: pg\\array{pg\\string} << .input_values
      [>] .result: pg\\array{pg\\string} >> .items

  using_method_syntax_on_types:
    forbidden: |
      [r] .upper << pg\\string.uppercase(.input)
      [r] .result << pg\\array.Append(.list, .item)
      # ERROR: Types don't have methods

    correct: |
      # Only string literal pipelines are valid inline
      [r] .upper: pg\\string << String.Upper"{.input}"

      # Everything else must be a pipeline call
      [r] |append_to_array
      [<] .list: pg\\array{pg\\string} << .existing_list
      [<] .item: pg\\string << .new_item
      [>] .result: pg\\array{pg\\string} >> .updated_list

  calling_undefined_pipelines:
    forbidden: |
      [r] |some_undefined_pipeline
      # ERROR: Pipeline not defined and not imported

    correct: |
      # Option 1: Import from package
      [@] Local@MyApp:1.0.0
      [<] @Utils << Community@Utilities:1.0.0
      [X]

      [r] @Utils|SomePipeline

      # Option 2: Define the pipeline in the file
      [|] some_defined_pipeline
      [i] #None
      [t] |T.Call
      [o] #None
      [X]

  constant_field_with_wrong_assignment:
    note: "In enumeration definitions, << means field is ALWAYS that value"
    example: |
      [#] Metadata
      [<] .field: pg\\string << ""    # Will ALWAYS be empty string (Ready)
      [<] .other: pg\\string           # Must be provided when used (Declared)
      [X]

  using_declared_variable_at_i_block:
    forbidden: |
      [#] Config
      [<] .timeout: pg\\int    # Declared state - no default

      [|] Process
      [i] .config: #Config << #Config   # ERROR: .timeout is Declared!
      # Runtime error: timeout field not Ready
    correct: |
      [#] Config
      [<] .timeout: pg\\int <~ 30    # DefaultReady state

      [|] Process
      [i] .config: #Config << #Config   # OK: .timeout has default

  overriding_default_twice:
    forbidden: |
      [#] Config
      [<] .port: pg\\int <~ 8080

      [|] Process
      [i] .config: #Config << #Config
      # .config.port is DefaultReady with 8080

      [r] .config.port << 9000   # First override -> Ready
      [r] .config.port << 3000   # ERROR: Already Ready (immutable)
    correct: |
      [#] Config
      [<] .port: pg\\int <~ 8080

      [|] Process
      [i] .config: #Config << #Config
      # Use the default 8080, or override ONCE before use

  not_checking_errors_field:
    forbidden: |
      [r] |RiskyOperation
      [>] .result >> .data
      # Ignore errors - .data might be Faulted!

      [r] |ProcessData
      [<] .input << .data   # Might fail silently
    correct: |
      [r] |RiskyOperation
      [>] .result: pg\\string >> .data
      [>] .errors: pg\\array{!} >> .operation_errors

      [?] .data.state =? #Variables.States.Faulted
      [~][r] |HandleError
      [~][<] .errors << .operation_errors

      [?] .data.state =? #Variables.States.Ready
      [~][r] |ProcessData
      [~][<] .input << .data

  using_await_keyword:
    forbidden: |
      [r] await |FetchData
      [>] .result >> .data
      # ERROR: No "await" keyword in Polyglot
    correct: |
      [r] |FetchData
      [>] .result >> .data
      # Runtime waits automatically

# ============================================================================
# VALIDATION CHECKLIST
# ============================================================================

validation:
  syntax_compliance:
    - "Every line starts with block marker"
    - "No {} for scope"
    - "No function signatures"
    - "No keywords"
    - "All variables have . prefix"
    - "[W] uppercase for all macro unwraps"

  structure_compliance:
    - "Pipelines use [|]...[X]"
    - "[<] and [>] after [r]/[p] have no [~]"
    - "Operations within contexts use [~]"
    - "Error handling uses [~][~]"
    - "Switch statements have [?] *? catchall"

  design_compliance:
    - "Pipeline is orchestration, not implementation"
    - "Using #Enumeration for known schemas"
    - "Pipeline is thin (~20 lines)"
    - "Delegating to Python/Rust/C++"
    - "Not implementing algorithms in Polyglot"

  type_compliance:
    - "Enumerations defined before use"
    - "Prefer #Enumeration over pg\\serial"
    - "#None for empty input/output"

  variable_assignment_compliance:
    - "No receiving from uninitialized variables (.var << .uninitialized)"
    - "Assignment direction correct (<< vs >> vs <~ vs ~>)"
    - "Use <~ for defaults in enumeration definitions"
    - "Ready variables immutable - no reassignment"
    - "DefaultReady variables can be overridden ONCE only"
    - "[i] blocks use only Ready or DefaultReady variables"
    - "Check .errors field for Faulted variables"

  pipeline_call_compliance:
    - "No method calls on types (pg\\array.method())"
    - "Only string literal pipelines inline (String.Upper\"text\")"
    - "All other operations use |PipelineName or @Package|PipelineName"
    - "No undefined pipeline calls (unless imported)"
    - "Array operators use ~ prefix (~ForEach)"

# ============================================================================
# CODE GENERATION STRATEGY
# ============================================================================

generation_strategy:

  step_1_understand_purpose:
    question: "Is this orchestration or implementation?"
    if_implementation: "ERROR - Delegate to Python/Rust/C++"
    if_orchestration: "Continue to step 2"

  step_2_identify_components:
    - "What external systems/languages are involved?"
    - "What data flows between them?"
    - "What triggers the workflow?"
    - "What are the known data schemas?"
    - "What operations might fail (need error handling)?"

  step_3_define_types:
    - "Define enumerations for ALL known schemas"
    - "Use <~ for fields with sensible defaults"
    - "Use schema-only (no operator) for required fields"
    - "Use << for truly constant fields"
    - "Use pg\\serial ONLY if truly dynamic"
    - "Define status/state enumerations"

  step_4_structure_pipeline:
    - "[@] package declaration if needed"
    - "[#] enumeration definitions (with defaults)"
    - "[|] pipeline definition"
    - "[i] input declarations (ensure Ready/DefaultReady)"
    - "[t] trigger"
    - "[W] runtime wrapper"
    - "[r] operations (delegate to other languages)"
    - "Add .errors output for operations that can fail"
    - "Check .state for Faulted variables"
    - "[o] output declarations"
    - "[X] close pipeline"

  step_5_validate:
    - "Check all syntax rules"
    - "Verify exhaustive conditionals"
    - "Confirm orchestration not implementation"
    - "Ensure enumerations defined before use"
    - "Verify [i] variables are Ready/DefaultReady"
    - "Check error handling for risky operations"
    - "Confirm no reassignment of Ready variables"

# ============================================================================
# COMPLETE VALID EXAMPLE
# ============================================================================

complete_example:
  description: "Email campaign automation with database integration"

  code: |
    [@] Local@Marketing.EmailCampaign:1.0.0
    [#] 1
    [<] @DB << Community@Database:2.0.0
    [<] @Email << Community@EmailService:3.1.0
    [X]

    [#] UserStatus
    [<] .Active
    [<] .InActive
    [X]

    [#] CampaignConfig
    [<] .campaign_id: pg\\string                    # Schema-only (Declared)
    [<] .template_name: pg\\string <~ "default"     # Default template (DefaultReady)
    [<] .batch_size: pg\\int <~ 100                 # Default 100 (DefaultReady)
    [X]

    [#] EmailRecipient
    [<] .user_id: pg\\string                        # Schema-only (Declared)
    [<] .email: pg\\string                          # Schema-only (Declared)
    [<] .name: pg\\string <~ "Unknown"              # Default name (DefaultReady)
    [<] .status: #UserStatus <~ #UserStatus.Active  # Default Active (DefaultReady)
    [X]

    [|] SendDailyCampaign
    [i] .campaign_id: pg\\string

    [t] T.Cron"0 9 * * *"

    [W] |W.Python3.11

    [r] @DB|FetchCampaignConfig
    [<] .id: pg\\string << .campaign_id
    [>] .config: #CampaignConfig >> .campaign_config
    [>] .errors: pg\\array{!} >> .config_errors

    [?] .campaign_config.state =? #Variables.States.Faulted
    [~][r] |U.Log.Error
    [~][<] .msg: pg\\string << "Failed to fetch config"
    [~][<] .errors: pg\\array{!} << .config_errors
    [~]
    [~][o] @DB!Database.QueryFailed

    [?] *?
    [~][r] @DB|FetchActiveRecipients
    [~][<] .campaign_id: pg\\string << .campaign_id
    [~][<] .limit: pg\\int << .campaign_config.batch_size
    [~][>] .recipients: pg\\array{#EmailRecipient} >> .recipient_list
    [~][>] .errors: pg\\array{!} >> .fetch_errors
    [~]
    [~][?] .recipient_list.state =? #Variables.States.Faulted
    [~][~][r] |U.Log.Error
    [~][~][<] .msg: pg\\string << "Failed to fetch recipients"
    [~][~][<] .errors: pg\\array{!} << .fetch_errors
    [~][~]
    [~][~][o] @DB!Database.QueryFailed

    [r] |validate_recipients
    [<] .recipients: pg\\array{#EmailRecipient} << .recipient_list
    [>] .valid_count: pg\\int >> .validated_count

    [?] .validated_count =? 0
    [~][r] |U.Log.Warn
    [~][<] .msg: pg\\string << "No valid recipients for campaign {.campaign_id}"
    [~]
    [~][o] !NoError

    [?] *?
    [~][p] @Email|SendBatch
    [~][<] .recipients: pg\\array{#EmailRecipient} << .recipient_list
    [~][<] .template: pg\\string << .campaign_config.template_name
    [~][>] .sent_count: pg\\int >> .email_sent
    [~]
    [~][p] @DB|UpdateCampaignStats
    [~][<] .campaign_id: pg\\string << .campaign_id
    [~][<] .sent: pg\\int << .validated_count
    [~][>] .updated: pg\\bool >> .stats_updated
    [~]
    [~][Y] |Y.Join
    [~][<] .email_sent
    [~][<] .stats_updated
    [~]
    [~][r] |U.Log.Info
    [~][<] .msg: pg\\string << "Campaign {.campaign_id} sent {.email_sent} emails"
    [~]
    [~][o] !NoError

    [X]

# ============================================================================
# END OF AI CODE GENERATION CONTEXT
# ============================================================================
