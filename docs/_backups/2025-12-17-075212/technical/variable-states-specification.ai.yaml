topic: Variable States Technical Specification
kw: [var-states, spec, FSM, transitions, Declared, Pending, Ready, Faulted, async]
sum: Technical spec for var state FSM: state definitions, transition rules, runtime behavior, validation requirements
pts:
  - FSM: Declared → DefaultReady/Pending → Ready/Faulted
  - Declared: type known, no value, cannot PULL
  - DefaultReady: <~ value set, can override once
  - Pending: async op running, blocks PULL
  - Ready: value available, PULL succeeds
  - Faulted: error state, propagates on PULL
  - Transitions: triggered by ops (<<, >>, pipeline calls)
  - Validation: compiler enforces state rules
  - Runtime: state tracking in IR/DBFlux
rels: [variable-states.md, architecture.md, enumerations.md]
code: [polyglot-parser/src/validation.rs, polyglot-ir/src/lib.rs]
