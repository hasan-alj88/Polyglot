topic: Variable State System
kw: [states, Declared, DefaultReady, Pending, Ready, Faulted, async, state-machine, transitions]
sum: Complete var state system: Declared → DefaultReady/Pending → Ready/Faulted; async-centric, auto transitions, no manual await
pts:
  - States: Declared, DefaultReady, Pending, Ready, Faulted
  - Declared: .var: type (no value yet)
  - DefaultReady: .var: type <~ value (override once)
  - Pending: async operation in-flight
  - Ready: value available, can PULL
  - Faulted: error occurred, propagates
  - Transitions: automatic on ops (<< >> pipeline calls)
  - No manual state mgmt, lang handles internally
  - [i] triggers when Ready state reached
