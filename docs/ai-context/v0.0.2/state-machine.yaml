# ==============================================================================
# Polyglot v0.0.2 - Variable State Machine
# Complete lifecycle specification for async-centric variables
# ==============================================================================

version: "0.0.2"
paradigm: "async-centric"
reserved_enum: "#PgVar.States"

# ==============================================================================
# TERMINOLOGY (CRITICAL FOR AI UNDERSTANDING)
# ==============================================================================

terminology:
  use_these_terms:
    - "PUSH to variable"
    - "PULL from variable"
    - "Variable States (Declared, DefaultReady, Pending, Ready, Faulted)"
    - "Declared state - ready for pushes"
    - "Ready state - final value, no more pushes"
    - "State transitions"

  avoid_these_terms:
    - "assign / assignment"
    - "mutable / immutable"
    - "initialize"
    - "set value"

  rationale: |
    Polyglot is async-centric, NOT traditional imperative.
    Variables don't just have values - they transition through STATES.
    This is fundamental to understanding the language.

# ==============================================================================
# CORE STATES (MVP - 5 states)
# ==============================================================================

states:
  Declared:
    enum_value: "#PgVar.States.Declared"
    description: "Schema declared, no value assigned"
    syntax: "[<] .variable: Type"
    push_count: 0
    push_count_allowed: 1
    transitions_to:
      - DefaultReady  # If default provided
      - Pending       # If async operation starts
      - Ready         # If constant assigned
    auto_await: false
    immutable: false
    has_value: false

  DefaultReady:
    enum_value: "#PgVar.States.DefaultReady"
    description: "Has default value, allows ONE override"
    syntax: "[<] .variable: Type <~ default_value"
    push_count: 1  # Already had 1 push (the default)
    push_count_allowed: 2  # Total 2 pushes allowed
    transitions_to:
      - Pending  # If async override starts
      - Ready    # If override completes or default used
    auto_await: false
    immutable: false
    has_value: true
    value_type: "default"
    override_semantics: "First push overrides default, second push is FINAL"

  Pending:
    enum_value: "#PgVar.States.Pending"
    description: "Async operation in progress, waiting for value"
    syntax: "[>] .source: Type >> .variable"
    push_count: "varies (depends on path)"
    transitions_to:
      - Ready     # Async operation succeeds
      - Faulted   # Async operation fails
      - Retrying  # If retry enabled (post-MVP)
    auto_await: true
    immutable: false
    has_value: false
    blocking: "Blocks when pulled from (<<, >>, =?, etc.)"

  Ready:
    enum_value: "#PgVar.States.Ready"
    description: "Value available, immutable"
    syntax: "[<] .variable: Type << value"
    push_count: "final (no more pushes allowed)"
    transitions_to:
      - Cached  # Post-MVP only
      - Dirty   # Post-MVP only
    auto_await: false
    immutable: true
    has_value: true
    value_type: "final"
    note: "Immutable once Ready - async operation completed"

  Faulted:
    enum_value: "#PgVar.States.Faulted"
    description: "Async operation failed, no value"
    syntax: "Automatic when pipeline fails"
    push_count: "failed"
    transitions_to:
      - Retrying  # If retry enabled (post-MVP)
    auto_await: false
    immutable: false
    has_value: false
    error_details: ".*.pgvar.errors"
    reserved_fields:
      - ".*.pgvar.errors: pg\\array{!ErrorType}"
      - ".*.pgvar.state: #PgVar.States.Faulted"

# ==============================================================================
# QUEUE MANAGEMENT STATES (Post-MVP - 4 states)
# ==============================================================================

post_mvp_states:
  Retrying:
    enum_value: "#PgVar.States.Retrying"
    description: "Automatic retry in progress after failure"
    transitions_to:
      - Ready    # Retry succeeds
      - Faulted  # All retries exhausted
    mvp_status: "Post-MVP (Epic 2)"

  Paused:
    enum_value: "#PgVar.States.Paused"
    description: "Waiting for external trigger to resume"
    transitions_to:
      - Pending  # Resumed
      - Faulted  # Timeout or cancellation
    mvp_status: "Post-MVP (Epic 2)"

  Cached:
    enum_value: "#PgVar.States.Cached"
    description: "Cached result, may be stale"
    transitions_to:
      - Dirty    # Cache invalidated
      - Ready    # Cache refreshed
    mvp_status: "Post-MVP (Epic 3)"

  Dirty:
    enum_value: "#PgVar.States.Dirty"
    description: "Cache invalid, needs refresh"
    transitions_to:
      - Pending  # Refresh started
      - Ready    # Refresh completed
    mvp_status: "Post-MVP (Epic 3)"

# ==============================================================================
# ASSIGNMENT OPERATORS → STATE MAPPING
# ==============================================================================

assignment_operators:
  input_required:
    syntax: "[i] .variable: Type"
    description: "Required input, must be provided by caller"
    result_state: "Declared"
    push_count_consumed: 0
    push_count_remaining: 0
    example: "[i] .user_id: pg\\string"
    note: "Inputs are provided by external caller, NOT pushed within pipeline"
    context: "Pipeline input declaration"

  input_default:
    syntax: "[i] .variable: Type <~ default_value"
    description: "Input with default, caller can override"
    result_state: "DefaultReady"
    push_count_consumed: 1
    push_count_remaining: 1
    example: "[i] .timeout: pg\\int <~ 30"
    note: "Caller can override default value when calling pipeline"
    context: "Pipeline input declaration"

  input_constant:
    syntax: "[i] .variable: Type << value"
    description: "Constant input, immediately Ready"
    result_state: "Ready"
    push_count_consumed: "final"
    push_count_remaining: 0
    example: "[i] .version: pg\\string << \"1.0.0\""
    note: "Caller cannot override constant value"
    context: "Pipeline input declaration"

  schema_only:
    syntax: "[r] .variable: Type"
    description: "Variable declaration only, no value"
    result_state: "Declared"
    push_count_consumed: 0
    push_count_remaining: 1
    example: "[r] .user_id: pg\\string"
    note: "Use [r] for variable declarations at pipeline scope, NOT [<]"
    use_case: "Collections that will receive conditional pushes"
    context: "Variable declaration within pipeline body"

  default:
    syntax: "[r] .variable: Type <~ default_value"
    description: "Default value provided, allows ONE override"
    result_state: "DefaultReady"
    push_count_consumed: 1
    push_count_remaining: 1
    override_allowed: true
    example: "[r] .timeout: pg\\int <~ 30"
    note: "Use [r] for variable declarations, then [<] within blocks to override"

  constant:
    syntax: "[r] .variable: Type << value"
    description: "Constant value, immediately Ready"
    result_state: "Ready"
    push_count_consumed: "final"
    push_count_remaining: 0
    immutable: true
    example: "[r] .version: pg\\string << \"1.0.0\""
    note: "Use [r] for variable declarations at pipeline scope"

  push_from_variable:
    syntax: "[<] .dest << .source"
    description: "Pull from source (auto-await), push to dest"
    result_state: "Depends on dest's current state"
    auto_await: "Waits for .source to be Ready"
    push_count_consumed: 1
    example: "[<] .output << .input"

  pull_to_variable:
    syntax: "[>] .source: Type >> .dest"
    description: "Pull from pipeline output, assign to dest"
    result_state: "Pending → Ready/Faulted"
    async_operation: true
    push_count_consumed: "async"
    example: "[>] .result: pg\\int >> .output"

# ==============================================================================
# AUTO-AWAIT SEMANTICS
# ==============================================================================

auto_await:
  trigger: "When 'pulling from' a variable"
  operators_that_pull:
    - "<<"  # Push operator
    - ">>"  # Pull operator
    - "=?"  # Equality comparison
    - ">?"  # Greater than
    - "<?"  # Less than
    - "=>?" # Greater or equal
    - "=<?" # Less or equal
    - "=!?" # Not equal
    - "[o]" # Output block
  behavior: |
    When any operator "pulls from" a variable in Pending state:
    1. Runtime blocks (non-busy wait)
    2. Waits for variable to transition to Ready or Faulted
    3. If Ready: operation proceeds with value
    4. If Faulted: error propagates
  no_explicit_await: true
  note: "No await keyword in Polyglot - automatic waiting"

# ==============================================================================
# RESERVED SCHEMA NAMESPACE
# ==============================================================================

reserved_schema:
  namespace: ".*.pgvar.*"
  description: "Reserved metadata namespace, always Ready"
  always_ready: true
  database_tracked: true
  fields:
    state:
      path: ".*.pgvar.state"
      type: "#PgVar.States.*"
      description: "Current variable state"
      always_ready: true
      queryable: true
    errors:
      path: ".*.pgvar.errors"
      type: "pg\\array{!ErrorType}"
      description: "Error details if Faulted"
      only_present_when: "Faulted"
    history:
      path: ".*.pgvar.history.{StateName}.at"
      type: "pg\\dt"
      description: "Timestamp of state transitions"
      example: ".user.pgvar.history.Pending.at"

# ==============================================================================
# STATE TRANSITION RULES
# ==============================================================================

transition_rules:
  - from: "Declared"
    to: ["DefaultReady", "Pending", "Ready"]
    valid: true

  - from: "DefaultReady"
    to: ["Pending", "Ready"]
    valid: true
    constraint: "Only 1 override allowed"

  - from: "Pending"
    to: ["Ready", "Faulted", "Retrying"]
    valid: true
    note: "Retrying is post-MVP"

  - from: "Ready"
    to: ["Cached", "Dirty"]
    valid: true
    mvp_status: "Post-MVP only"
    note: "Ready is terminal in MVP"

  - from: "Faulted"
    to: ["Retrying"]
    valid: true
    mvp_status: "Post-MVP only"
    note: "Faulted is terminal in MVP"

  invalid_transitions:
    - from: "Ready"
      to: "Pending"
      reason: "Once Ready, cannot return to Pending (immutable)"

    - from: "Ready"
      to: "Declared"
      reason: "Cannot un-declare a variable"

    - from: "Faulted"
      to: "Ready"
      reason: "Cannot magically succeed after failure (use Retrying)"

# ==============================================================================
# PUSH COUNT SEMANTICS
# ==============================================================================

push_count:
  description: "Tracks how many times a variable has been assigned"
  purpose: "Enforces immutability after final assignment"

  rules:
    schema_only:
      initial: 0
      allowed: 1
      behavior: "First push is FINAL (becomes Ready)"

    default:
      initial: 1  # Default counts as first push
      allowed: 2  # One override permitted
      behavior: "Second push is FINAL (becomes Ready)"

    constant:
      initial: "final"
      allowed: 0
      behavior: "Immediately Ready, no further pushes"

  enforcement:
    compile_time: "Parser validates push count limits"
    runtime: "IR tracks push_count, runtime enforces"

  errors:
    exceeded_push_count: "ERROR: Variable already has final value (0 pushes remaining)"
    example: |
      [<] .var: pg\\int << 10   # Ready (0 pushes left)
      [<] .var << 20             # ERROR: Cannot push to Ready variable

# ==============================================================================
# IMMUTABILITY SEMANTICS
# ==============================================================================

immutability:
  philosophy: "Immutability is a CONSEQUENCE of async coordination, not a design goal"

  explanation: |
    Variables in Polyglot ARE immutable once Ready, but "immutability"
    is NOT the defining characteristic. Instead:

    - Variables transition through STATES as async operations complete
    - Once a variable reaches Ready, the async operation fulfilled its purpose
    - There's no reason for it to change - it's Ready
    - This "immutability" emerges naturally from the async lifecycle

    Traditional debates about "const vs let" don't apply.

  contrast_with_traditional:
    synchronous_languages:
      - "Immutable: Value never changes after assignment"
      - "Mutable: Value can be modified after assignment"
      - "Values available immediately"

    polyglot_async_centric:
      - "Variables transition through states (Declared → Pending → Ready)"
      - "Immutable once Ready, but that's a consequence, not the goal"
      - "State transitions coordinate async operations"
      - "No explicit await - automatic waiting"
