# ==============================================================================
# Polyglot v0.0.2 - Language Constraints & Edge Cases
# Dense reference for constraint validation
# ==============================================================================

version: "0.0.2"
purpose: "Complete constraint specification for AI validation"

# ==============================================================================
# 🚨 CRITICAL PARADIGM - READ THIS FIRST
# ==============================================================================

critical_paradigm:
  rule: "Polyglot is a PIPELINE ORCHESTRATION language, NOT a polyglot-syntax language"
  severity: "CRITICAL"

  what_polyglot_is:
    description: "Pipeline orchestration DSL that coordinates external runtimes"
    capabilities:
      - "Calls Python/Rust/Node/Go via runtime wrappers"
      - "Orchestrates data flow between heterogeneous systems"
      - "Manages async execution and state transitions"
      - "Uses pg\\serial as universal interchange format"

  what_polyglot_is_NOT:
    description: "NOT a language where you write foreign code inline"
    invalid_concepts:
      - syntax: "py\\requests.get(.url)"
        reason: "NO SUCH SYNTAX - cannot call Python directly"
        correct: "[r] |RT.Python.Run.Function [<] <function: pg\\string << \"requests.get\""

      - syntax: "rs\\serde::parse(.data)"
        reason: "NO SUCH SYNTAX - cannot call Rust directly"
        correct: "[r] |RT.Rust.Run.Function [<] <function: pg\\string << \"serde::parse\""

      - syntax: ".result << js\\pdf.create(.data)"
        reason: "NO SUCH SYNTAX - cannot call Node.js directly"
        correct: "[r] |RT.Nodejs.Run.File [<] <file: pg\\path << \\\\FileDir\\\\pdf.js"

  correct_patterns:
    runtime_wrapper_declaration:
      description: "Declare runtime wrappers in [W] section"
      examples:
        - "[W] |W.RT.Python3.14"
        - "[W] |W.RT.Rust1.8"
        - "[W] |W.RT.Nodejs"

    calling_external_code:
      description: "Call external code via RT pipelines"
      examples:
        - syntax: "[r] |RT.Python.Run.File"
          usage: "Execute entire Python file"
        - syntax: "[r] |RT.Python.Run.Function"
          usage: "Call specific Python function"
        - syntax: "[r] |RT.Rust.Run.File"
          usage: "Execute Rust file/module"

    data_interchange:
      description: "Use pg\\serial for cross-language data"
      input: "[<] <input: pg\\serial << .data    // Auto-convert TO target language"
      output: "[>] >output: pg\\serial >> .result  // Auto-convert FROM target language"
      access: ".result.0, .result.field  // Access serial data by index or field name"

  remember:
    - "Polyglot ORCHESTRATES polyglot systems"
    - "Polyglot does NOT MIX polyglot syntax"
    - "Runtime wrappers are the ONLY way to call external code"
    - "pg\\serial is the universal data interchange format"

# ==============================================================================
# CODE EXAMPLE INTERPRETATION RULES
# ==============================================================================

example_interpretation:
  rule: "Code examples using `...` or `// ... code ...` are INCOMPLETE and demonstrate specific features ONLY"
  severity: "HIGH"

  when_examples_use_ellipsis:
    description: "Ellipsis indicates omitted code for brevity - DO NOT copy literally"
    markers:
      - "..."
      - "// ..."
      - "// ... Some code ..."
      - "// ... rest of pipeline ..."

    interpretation:
      focused_example: "Example shows ONLY the relevant feature being demonstrated"
      not_complete: "Missing code MUST be filled in based on actual requirements"
      context_specific: "Omitted sections depend on your specific use case"

  examples:
    incomplete_example:
      code: |
        [|] |ExamplePipeline
        [i] .input: pg\\string
        // ...
        [r] .result: pg\\string << |SomeFeature"{.input}"  // Focus: string literal syntax
        // ...
        [X]

      interpretation:
        shows: "String literal syntax for inline pipeline calls"
        omits:
          - "[@] package declaration"
          - "[t] trigger section"
          - "[W] wrapper section"
          - "[o] output section"
        action: "YOU must add all mandatory sections when generating real code"

    complete_example:
      code: |
        [@] @Local::Complete:1.0.0.0
        [X]

        [|] |CompletePipeline
        [i] .input: pg\\string
        [t] |T.Call
        [W] |W.Polyglot.Scope
        [r] .result: pg\\string << |SomeFeature"{.input}"
        [o] .result: pg\\string
        [X]

      interpretation:
        shows: "Same feature but in complete, valid pipeline"
        omits: "Nothing - this is production-ready code"
        action: "Can use as-is or adapt as needed"

  rules_for_code_generation:
    - rule: "NEVER copy incomplete examples literally"
      action: "Fill in ALL mandatory sections ([@], [t], [W], [o])"

    - rule: "Ellipsis means 'context-dependent code goes here'"
      action: "Determine what's needed based on requirements"

    - rule: "If example shows ONE feature, assume OTHER features need standard implementation"
      action: "Add triggers, wrappers, inputs, outputs as appropriate"

    - rule: "Focused examples are for LEARNING, not COPYING"
      action: "Understand the pattern, then apply it in complete context"

  warning:
    message: "⚠️ Code with `...` is TEACHING a concept, not providing copy-paste code"
    consequence: "Copying incomplete examples will result in non-functional pipelines"
    solution: "Extract the demonstrated pattern and integrate into complete pipeline structure"

# ==============================================================================
# OPERATOR PREFIX RULE - ALL OBJECTS
# ==============================================================================

operator_prefix_mandatory:
  rule: "ALL Polyglot objects MUST have operator prefix - even in definitions"
  severity: "CRITICAL"
  applies_to: "Pipelines, Enumerations, Errors"

  correct_syntax:
    pipelines:
      definition: "[|] |PipelineName"
      explanation: "Block marker [|] + pipe prefix | + name"
      examples:
        - "[|] |ProcessData"
        - "[|] |ValidateInput"
        - "[|] |FetchUser"

    enumerations:
      definition: "[#] #EnumName"
      explanation: "Block marker [#] + hash prefix # + name"
      examples:
        - "[#] #UserRole"
        - "[#] #Config"
        - "[#] #StatusCode"

    errors:
      definition: "[!] !ErrorName"
      explanation: "Block marker [!] + exclamation prefix ! + name"
      examples:
        - "[!] !NetworkTimeout"
        - "[!] !ValidationError"
        - "[!] !DatabaseError"

  incorrect_syntax:
    wrong_no_prefix:
      - code: "[|] PipelineName"
        error: "Missing | prefix in pipeline name"
        correct: "[|] |PipelineName"

      - code: "[#] EnumName"
        error: "Missing # prefix in enum name"
        correct: "[#] #EnumName"

      - code: "[!] ErrorName"
        error: "Missing ! prefix in error name"
        correct: "[!] !ErrorName"

  usage_everywhere:
    rule: "Prefix required in BOTH definition AND usage"
    definition: "[#] #Config"
    usage: ".settings: #Config"
    both_have_prefix: true

  historical_note:
    previous_rule: "OLD: Block marker only, no prefix in name (e.g., [#] Config)"
    current_rule: "NEW: Block marker + prefix in name (e.g., [#] #Config)"
    change_reason: "Syntax consistency - all objects need operator prefixes"

# ==============================================================================
# COLLECTION CONSTRAINTS
# ==============================================================================

collection_nesting:
  rule: "Collections CANNOT contain other collections directly"
  severity: "ERROR"

  invalid_patterns:
    - pattern: "pg\\array{pg\\array{T}}"
      reason: "Arrays cannot contain arrays directly"
      error_message: "Collection type may not have another collection as their items"

    - pattern: "pg\\set{pg\\array{T}}"
      reason: "Sets cannot contain arrays"
      error_message: "Collection nesting not allowed"

    - pattern: "pg\\array{pg\\set{T}}"
      reason: "Arrays cannot contain sets"
      error_message: "Collection nesting not allowed"

  valid_workaround:
    description: "Wrap inner collection in enumeration"
    pattern: |
      [#] #Row
      [<] .cells: pg\\array{T}
      [X]
      [i] .matrix: pg\\array{#Row}

    examples:
      matrix: "pg\\array{#Row} where Row contains pg\\array{pg\\int}"
      table: "pg\\array{#Record} where Record contains pg\\array{pg\\string}"
      nested_lists: "pg\\array{#Group} where Group contains pg\\array{#Item}"

  exception_recursive:
    description: "Recursive structures ARE allowed"
    pattern: "pg\\array{#TreeNode} where TreeNode contains pg\\array{#TreeNode}"
    valid: true
    examples:
      tree: "[#] #TreeNode [<] .children: pg\\array{#TreeNode} [X]"
      graph: "[#] #GraphNode [<] .edges: pg\\array{#GraphNode} [X]"
      menu: "[#] #MenuItem [<] .submenus: pg\\array{#MenuItem} [X]"

# ==============================================================================
# ENUMERATION CONSTRAINTS
# ==============================================================================

enum_serial_mixing:
  rule: "Enum fields and serial fields CANNOT be siblings"
  constraint: "Can be uncles (different hierarchy levels)"
  severity: "ERROR"

  invalid_example:
    code: |
      [#] #BadMixing
      [<] .EnumField              # Enum field (no type)
      [<] .serial_field: pg\\int  # Serial field (has type)
      [X]
    reason: "Enum and serial fields are siblings (same level)"
    error_message: "Cannot mix enum and serial fields as siblings"

  valid_example_uncles:
    code: |
      [#] #GoodMixing
      [<] .category.Option1       # Enum field (nested under .category)
      [<] .category.Option2       # Enum field (nested under .category)
      [<] .metadata: pg\\string   # Serial field (top level)
      [X]
    reason: "Enum fields under .category, serial field at top level (uncles)"

  field_types:
    enum_field:
      syntax: "[<] .FieldName"
      characteristics:
        - "No type specified"
        - "No value assigned"
        - "Declaration only"
      use: "Enum variants"

    serial_field:
      syntax: "[<] .field_name: Type <~ default"
      characteristics:
        - "Type required"
        - "Optional default value"
        - "Typed field"
      use: "Struct fields"

# ==============================================================================
# SERIAL LOADING CONSTRAINTS
# ==============================================================================

serial_loading:
  rule: "[s] blocks load data files serially (NOT streaming)"
  severity: "CRITICAL"
  terminology:
    correct: "serial file I/O"
    incorrect: "streaming"
    note: "[s] is ALWAYS serial file loading, NEVER streaming"

  two_contexts:
    enumeration_context:
      description: "Static configuration loading at initialization"
      syntax: "[s] |YAML.Load\"config.yaml\""
      requires:
        - "Serial schema [~][s] <~ .field:type (Safety Mechanism 5)"
        - "Error handling [s][!] (Safety Mechanism 4)"
      examples:
        - |
          [#] #Config
          [~][s] <~ .timeout:pg\int
          [~][s] <~ .api_key:pg\string
          [~][s] <~ .debug:pg\bool
          [s] |YAML.Load"config.yaml"
          [s][!] *
          [X]

    pipeline_context:
      description: "Dynamic file processing at runtime"
      syntax: "[s] |Pipeline with [<] inputs and [>] outputs"
      requires:
        - "Error handling [s][!] (Safety Mechanism 4)"
        - "NO schema required (explicit variable assignments)"
      examples:
        - |
          [|] LoadData
          [i] .json_file:pg\path
          [t] |T.Call
          [W] |W.Polyglot.Scope

          [s] |JSON.Load.Files
          [<] <files:pg\array.pg\path << .json_files
          [>] >json_data:pg\serial >> .data
          [s][!] *

          [o] .data:pg\serial
          [X]

  safety_mechanism_4_explicit_error_handling:
    rule: "ALL [s] blocks MUST have error handling [s][!]"
    applies_to: "Both enumeration and pipeline contexts"
    options:
      default_handler: "[s][!] *"
      custom_handler: "[s][!] followed by [r] blocks"
    invalid_example: |
      [#] #Config
      [<] .timeout:pg\int
      [s] |YAML.Load"config.yaml"
      [X]
    error_message: "Enumeration '#Config' has serial blocks [s] but no error handling [s][!]"
    valid_example: |
      [#] #Config
      [<] .timeout:pg\int
      [s] |YAML.Load"config.yaml"
      [s][!] *
      [X]

  safety_mechanism_5_schema_enforcement:
    rule: "Enumeration [s] blocks MUST declare expected fields with [~][s] <~ .field:type"
    applies_to: "ONLY enumerations, NOT pipelines"
    rationale: "Prevents runtime surprises, enables compile-time validation, catches typos"

    schema_declaration_syntax:
      explicit_fields: "[~][s] <~ .field_name:type"
      wildcard: "[~][s] <~ *"

    examples:
      explicit_schema: |
        [#] #Config
        [~][s] <~ .timeout:pg\int
        [~][s] <~ .api_key:pg\string
        [~][s] <~ .debug:pg\bool
        [s] |YAML.Load"config.yaml"
        [s][!] *
        [X]

      wildcard_schema: |
        [#] #FlexibleConfig
        [~][s] <~ .timeout:pg\int       # Must declare
        [~][s] <~ .api_key:pg\string    # Must declare
        [~][s] <~ *                     # Allow other fields
        [s] |YAML.Load"config.yaml"
        [s][!] *
        [X]

      no_schema_required_in_pipeline: |
        [|] LoadData
        [i] .json_file:pg\path
        [t] |T.Call
        [W] |W.Polyglot.Scope
        [s] |JSON.Load.Files
        [<] <files:pg\array.pg\path << .json_files
        [>] >json_data:pg\serial >> .data    # Explicit variable
        [s][!] *
        [o] .data:pg\serial
        [X]

    field_handling:
      declared_fields: "Loaded and type-checked from file"
      undeclared_fields: "Silently ignored (unless wildcard [~][s] <~ * used)"
      wildcard_fields: "All other fields loaded with type inference"

    why_only_enumerations:
      enumerations: "Fields ambiguous without schema (could be from file, could be typo)"
      pipelines: "Variables explicitly declared with types and bindings"

  parallel_execution:
    rule: "Multiple [s] blocks at same nesting level run in parallel"
    example: |
      [#] #AppConfig
      [~][s] <~ .database_url:pg\url
      [~][s] <~ .cache_url:pg\url
      [s] |YAML.Load"database.yaml"     # Loads in parallel
      [s] |YAML.Load"cache.yaml"        # Loads in parallel
      [s][!] *                          # Shared error handling
      [X]

  partial_failure_handling:
    rule: "Error handler runs independently for each failure"
    behavior:
      - "Successful loads complete normally"
      - "Failed loads trigger error handler with context"
      - "Graceful degradation allows partial configuration"
    error_context_variables:
      file: "{!.file} - Path to file that failed"
      message: "{!.message} - Error description"
      block: "{!.block} - Block identifier that failed"

  nesting_with_prefix:
    rule: "[~] prefix indicates nesting level"
    examples:
      level_0: "[s] |YAML.Load\"file.yaml\"           # No nesting"
      level_1: "[~][s] |YAML.Load\"file.yaml\"        # Level 1"
      level_2: "[~][~][s] |YAML.Load\"file.yaml\"     # Level 2"
    error_handler_scope:
      rule: "[s][!] catches errors at its nesting level only"
      example: |
        [?] .enable_json_loading
        [~][s] |JSON.Load.Files
        [~][<] <files:... << .json_files
        [~][>] >json_data:... >> .data
        [~][s][!]                         # Level 1 error handler
        [~][~][r] |U.Log.Warn"Failed"     # [r] nested inside [s][!]
        [X]

  shorthand_vs_full_form:
    shorthand_syntax:
      description: "User-friendly syntax using pipeline formatted strings"
      syntax: "[s] .var:type << Pipeline\"{arg}(.field.path)\""
      example: "[s] .debug:pg\\bool << JSON.Load.Field\"{.json_file}(.debug)\""
      note: "Uses string literals with interpolation"

    full_form_syntax:
      description: "Foundation syntax with explicit I/O bindings"
      syntax: "[s] |Pipeline with [<] inputs and [>] outputs"
      example: |
        [s] |JSON.Load.Field
        [<] <file:pg\path << .json_file
        [<] <field:pg\string << ".debug"
        [>] >value:pg\bool >> .debug
      priority: "Implement full form first, then shorthand"

# ==============================================================================
# BLOCK MARKER HIERARCHY CONSTRAINTS
# ==============================================================================

block_marker_hierarchy:
  rule: "Block markers have specific usage contexts and hierarchy"
  severity: "ERROR"

  markers:
    "[r]":
      name: "Sequential execution OR variable declaration"
      context_dependent: true

      usage_1_variable_declaration:
        context: "At pipeline scope (top-level)"
        syntax: "[r] .variable: Type << value"
        examples:
          - |
            [|] |Example
            [i] !No.Input
            [t] |T.Call
            [W] |W.Polyglot.Scope

            [r] .user: pg\\string << "Alice"       # Variable declaration
            [r] .count: pg\\int << 42               # Variable declaration
            [r] .timestamp: pg\\dt << |DT.Now""      # Variable declaration

            [o] !No.Output
            [X]
        semantics: "Declares variable at pipeline scope"

      usage_2_pipeline_call:
        context: "In execution flow"
        syntax: "[r] |PipelineName"
        examples:
          - |
            [|] |Example
            [i] .user_id: pg\\string
            [t] |T.Call
            [W] |W.Polyglot.Scope

            [r] |FetchUser                          # Sequential pipeline call
            [<] .id << .user_id
            [>] .user >> .user_data

            [r] |ProcessData                        # Sequential pipeline call
            [<] .data << .user_data
            [>] .result >> .processed

            [o] .processed: pg\\string
            [X]
        semantics: "Sequential pipeline execution"

    "[<]":
      name: "Input binding"
      context: "ONLY within parent block context"
      parent_required: true

      valid_parents:
        - "Pipeline call [r] |Pipeline"
        - "Unpack operator [p] ~ForEach"
        - "Queue control [Q] |Q.Priority"
        - "Trigger config [t] |T.Cron"
        - "Wrapper config [W] |W.Python3.11"
        - "Join operator [Y] ~Y.IntoArray"

      valid_usage:
        - syntax: "[r] |Pipeline [<] .input: Type << value"
          description: "Input binding to pipeline call"
          complete_example: |
            [|] |Example
            [i] .data: pg\\string
            [t] |T.Call
            [W] |W.Polyglot.Scope

            [r] |Pipeline                           # Pipeline call
            [<] .input: pg\\string << .data         # Input binding (has type and value)
            [>] .output: pg\\string >> .result

            [o] .result: pg\\string
            [X]
        - syntax: "[p] ~ForEach [<] .items"
          description: "Input to unpack operator (variable only, no type or push)"
          complete_example: |
            [|] |Example
            [i] .items: pg\\array{pg\\string}
            [t] |T.Call
            [W] |W.Polyglot.Scope

            [p] ~ForEach                            # Unpack operator
            [<] .items                              # Input (variable only - no type, no push)
            [>] .item
            [~][r] .processed: pg\\string << .item
            [~][Y] ~Y.IntoArray
            [~][<] .processed
            [~][>] .results
            [~]

            [o] .results: pg\\array{pg\\string}
            [X]

      invalid_usage:
        - syntax: "[<] .variable: Type << value"
          reason: "No parent block - standalone [<] not allowed"
          error_message: "Input binding [<] requires parent block context"
          correct_syntax: "[r] .variable: Type << value"
          correct_example: |
            [|] |Example
            [i] !No.Input
            [t] |T.Call
            [W] |W.Polyglot.Scope

            [r] .variable: pg\\string << "value"    # CORRECT - uses [r], not [<]

            [o] .variable: pg\\string
            [X]

    "[>]":
      name: "Output binding"
      context: "ONLY within parent block context"
      parent_required: true

      valid_parents:
        - "Pipeline call [r] |Pipeline"
        - "Unpack operator outputs"
        - "Join operator outputs"

      valid_usage:
        - syntax: "[r] |Pipeline [>] .output: Type >> .result"
          description: "Output from pipeline call"

      invalid_usage:
        - syntax: "[>] .variable: Type >> .source"
          reason: "No parent block"
          error_message: "Output binding [>] requires parent block context"

  common_mistakes:
    mistake_1:
      wrong_fragment: "[<] .current_time: pg\\dt << |DT.Now"
      right_fragment: "[r] .current_time: pg\\dt << |DT.Now\"\""
      explanation: "Variable declaration at pipeline scope uses [r], not [<]"
      complete_example: |
        [|] |Example
        [i] !No.Input
        [t] |T.Call
        [W] |W.Polyglot.Scope

        [r] .current_time: pg\\dt << |DT.Now""       # CORRECT - uses [r]
        # NOT: [<] .current_time: pg\\dt << |DT.Now  # WRONG - [<] requires parent

        [o] .current_time: pg\\dt
        [X]

    mistake_2:
      wrong_fragment: "[<] .channels: pg\\array{#Channel} << {}"
      right_fragment: "[r] .channels: pg\\array{#Channel}"
      explanation: "Variable declaration uses [r]. Also, pushing empty array makes variable Ready (no more pushes allowed)"
      complete_example: |
        [|] |Example
        [i] .enable_email: pg\\bool
        [i] .enable_sms: pg\\bool
        [t] |T.Call
        [W] |W.Polyglot.Scope

        [r] .channels: pg\\array{#Channel}          # CORRECT - Declared state, allows pushes

        [?] .enable_email =? #Boolean.True
        [~][<] .channels << #Channel.Email          # Conditional push
        [~]

        [?] .enable_sms =? #Boolean.True
        [~][<] .channels << #Channel.SMS            # Conditional push
        [~]

        [?] *?
        [~][o] !No.Output
        [~]

        [o] .channels: pg\\array{#Channel}
        [X]

    mistake_3:
      wrong_fragment: "|DT.Now"
      right_fragment: "|DT.Now\"\""
      explanation: "Inline pipeline calls are string literals"
      complete_example: |
        [|] |Example
        [i] !No.Input
        [t] |T.Call
        [W] |W.Polyglot.Scope

        [r] .timestamp: pg\\dt << |DT.Now""          # CORRECT - string literal syntax
        # NOT: [r] .timestamp: pg\\dt << |DT.Now     # WRONG - missing quotes

        [o] .timestamp: pg\\dt
        [X]

# ==============================================================================
# OPERATOR PREFIX CONSTRAINTS
# ==============================================================================

no_keywords:
  rule: "ALL identifiers MUST have operator prefix"
  exceptions: "NONE - this is absolute"
  severity: "ERROR"

  required_prefixes:
    variables:
      prefix: "."
      invalid: ["variable", "my_var", "user"]
      valid: [".variable", ".my_var", ".user"]

    enumerations:
      prefix: "#"
      invalid: ["UserProfile", "PgVar.States.Ready"]
      valid: ["#UserProfile", "#PgVar.States.Ready"]

    pipelines:
      prefix: "|"
      invalid: ["ProcessData", "T.Cron", "W.Python3.11"]
      valid: ["|ProcessData", "|T.Cron", "|W.Python3.11"]

    errors:
      prefix: "!"
      invalid: ["Network.Timeout", "ValidationError"]
      valid: ["!Network.Timeout", "!ValidationError"]

  rationale:
    - "Clarity: No ambiguity about identifier type"
    - "Consistency: Same pattern everywhere"
    - "Serialization: Maps to hierarchical tree"
    - "Cross-language: Unambiguous serialization"

# ==============================================================================
# EXHAUSTIVE CONDITION CONSTRAINTS
# ==============================================================================

exhaustive_conditions:
  rule: "ALL [?] conditional blocks MUST include catch-all [?] *?"
  severity: "ERROR"

  invalid_example:
    code: |
      [|] |InvalidExample
      [i] .value: pg\\int
      [t] |T.Call
      [W] |W.Polyglot.Scope

      [?] .value >? 100
      [~][r] .result: pg\\string << "high"
      [~]
      # ERROR: Missing [?] *? catch-all - NON-EXHAUSTIVE!

      [o] .result: pg\\string
      [X]
    error_message: "Non-exhaustive conditions - must include [?] *?"

  valid_example:
    code: |
      [|] |ValidExample
      [i] .value: pg\\int
      [t] |T.Call
      [W] |W.Polyglot.Scope

      [r] .result: pg\\string << "unknown"

      [?] .value >? 100
      [~][<] .result << "high"
      [~]

      [?] *?                    # REQUIRED - makes conditions exhaustive
      [~][<] .result << "default"
      [~]

      [o] .result: pg\\string
      [X]

  rationale: "In async environments, unhandled conditions lead to indefinite waiting"

# ==============================================================================
# VARIABLE STATE AND PUSH SEMANTICS
# ==============================================================================

variable_push_semantics:
  terminology:
    rule: "Use async-centric terminology, NOT traditional programming terms"
    correct: ["PUSH to variable", "PULL from variable", "Variable States", "Declared state", "Ready state"]
    incorrect: ["assign", "assignment", "mutable", "immutable", "initialize"]
    note: "Polyglot is async-centric - variables transition through states"

  declared_state_for_collections:
    rule: "Declare collections in Declared state to allow multiple pushes"

    wrong_pattern:
      code_fragment: "[r] .channels: pg\\array{#Channel} << {}"
      issues:
        - "Pushing empty array makes variable Ready state immediately"
        - "Ready state = 0 pushes remaining"
        - "Cannot push more items after this"
      error: "Variable already in Ready state, cannot accept more pushes"

    correct_pattern:
      code_fragment: "[r] .channels: pg\\array{#Channel}"
      explanation:
        - "Variable in Declared state"
        - "Push count: 0, allowed: 1"
        - "Can push items conditionally"
        - "After all pushes, transitions to Ready"
      complete_example: |
        [|] |Example
        [i] .enable_email: pg\\bool
        [i] .enable_sms: pg\\bool
        [t] |T.Call
        [W] |W.Polyglot.Scope

        [r] .channels: pg\\array{#Channel}          # Declared state - allows pushes

        [?] .enable_email =? #Boolean.True
        [~][<] .channels << #Channel.Email          # PUSH item conditionally
        [~]

        [?] .enable_sms =? #Boolean.True
        [~][<] .channels << #Channel.SMS            # PUSH another item
        [~]

        [?] *?                                      # Exhaustive catch-all
        [~][o] !No.Output
        [~]

        # After conditional pushes, .channels becomes Ready
        [o] .channels: pg\\array{#Channel}
        [X]

  immediate_ready_vs_declared:
    immediate_ready:
      syntax: "[r] .var: Type << value"
      state: "Ready (immediately)"
      push_count: "final (0 remaining)"
      use_case: "Constants, single immediate values"
      example_fragments:
        - "[r] .version: pg\\string << \"1.0.0\""
        - "[r] .max_retries: pg\\int << 3"
      complete_example: |
        [|] |Example
        [i] !No.Input
        [t] |T.Call
        [W] |W.Polyglot.Scope

        [r] .version: pg\\string << "1.0.0"         # Immediate Ready state
        [r] .max_retries: pg\\int << 3              # Immediate Ready state

        [o] .version: pg\\string
        [X]

    declared_state:
      syntax: "[r] .var: Type"
      state: "Declared"
      push_count: "0, allowed: 1"
      use_case: "Variables that will receive pushes later"
      example_fragments:
        - "[r] .channels: pg\\array{#Channel}"
        - "[r] .result: #UserProfile"
      complete_example: |
        [|] |Example
        [i] .user_id: pg\\string
        [t] |T.Call
        [W] |W.Polyglot.Scope

        [r] .channels: pg\\array{#Channel}          # Declared state
        [r] .result: #UserProfile                   # Declared state

        # Later: push values
        [<] .channels << #Channel.Email
        [<] .result << #UserProfile{.name: "Alice"}

        [o] .result: #UserProfile
        [X]

# ==============================================================================
# STATE TRANSITION CONSTRAINTS
# ==============================================================================

invalid_state_transitions:
  - from: "Ready"
    to: "Pending"
    reason: "Once Ready, cannot return to Pending (immutable)"
    severity: "ERROR"

  - from: "Ready"
    to: "Declared"
    reason: "Cannot un-declare a variable"
    severity: "ERROR"

  - from: "Faulted"
    to: "Ready"
    reason: "Cannot succeed after failure (use Retrying state)"
    severity: "ERROR"

  - from: "Declared"
    to: "Faulted"
    reason: "Must transition through Pending first"
    severity: "ERROR"

# ==============================================================================
# PUSH COUNT CONSTRAINTS
# ==============================================================================

push_count_limits:
  schema_only:
    initial: 0
    allowed: 1
    error_when_exceeded: "Variable already has final value (0 pushes remaining)"

  default:
    initial: 1
    allowed: 2
    error_when_exceeded: "Default already overridden (0 pushes remaining)"

  constant:
    initial: "final"
    allowed: 0
    error_when_exceeded: "Cannot push to Ready/constant variable"

# ==============================================================================
# TYPE COMPATIBILITY CONSTRAINTS
# ==============================================================================

comparison_constraints:
  numeric_only:
    operators: [">?", "<?", "=>?", "=<?"]
    valid_types: ["pg\\int", "pg\\float"]
    invalid_types: ["pg\\string", "pg\\bool", "enumerations"]

  comparable:
    operators: [">?", "<?", "=>?", "=<?"]
    valid_types: ["pg\\string (lexicographic)", "pg\\dt (chronological)"]

  equality_any:
    operators: ["=?", "=!?"]
    valid_types: "ANY type"

# ==============================================================================
# SYNTAX CONSTRAINTS
# ==============================================================================

syntax_rules:
  type_separator:
    valid: "\\"
    invalid: ["/", ":", "."]
    examples:
      correct: "pg\\string"
      incorrect: ["pg/string", "pg:string", "pg.string"]

  collection_literals:
    delimiter: "{}"
    invalid_delimiter: "[]"
    syntax: "<< {item1, item2, item3}"
    empty_collection: "<< {}"
    examples:
      correct:
        - "<< {1, 2, 3}"
        - "<< {\"a\", \"b\", \"c\"}"
        - "<< {#Channel.Email, #Channel.SMS}"
        - "<< {}"
      incorrect:
        - "<< [1, 2, 3]"
        - "<< []"
    note: "All collections use {} with comma separation, NOT []"

  inline_pipelines:
    critical: "String literals are NOT primitives - they are inline pipeline calls"
    rule: "All inline pipeline calls use string literal syntax"
    syntax: "Pipeline.Name\"formatted_argument_string\""
    implicit_call: "\"text\" → U.String\"text\""
    empty_parameters: "Pipeline.Name\"\" (empty string MANDATORY)"

    usage_constraint:
      rule: "Inline pipeline call syntax ONLY valid for specific pipeline signatures"
      conditions:
        required:
          - "Pipeline has NO input (except .formatted_argument_string)"
        and_one_of:
          - "Pipeline has exactly ONE output"
          - "Pipeline outputs are packed into pg\\serial type"
      valid_examples:
        - "DT.Now\"\" - No input, single pg\\dt output"
        - "DT.Minutes\"5\" - Single string input, single pg\\dt output"
        - "U.String\"hello\" - Single string input, single pg\\string output"
        - "Pipeline.Packed\"...\" - Multiple outputs packed into pg\\serial"
      invalid_examples:
        - syntax: "Pipeline.TwoOutputs\"...\""
          reason: "Multiple outputs not packed into pg\\serial"
          correct: "Use full pipeline call syntax with [<] and [>] bindings"

    interpolation:
      syntax: "\"{.variable:format}\""
      examples:
        - "\"{.var}\" - default formatting"
        - "\"{.count:Hex}\" - hexadecimal format"
        - "\"{.price:Currency}\" - currency format"
      processing: "Calls |U.String.{language}.{type}.{format_identifier}"

    pipeline_signature:
      input: ".formatted_argument_string: pg\\string (MANDATORY name)"
      trigger: "|T.String.Call (MANDATORY)"
      output: "Single output of ANY type (not limited to strings)"

    correct_fragments:
      - "\"hello\" → U.String\"hello\""
      - "DT.Now\"\" → returns pg\\dt"
      - "DT.Minutes\"5\" → returns pg\\dt"
      - "DT.ToNow\"{.start}\" → with interpolation"
      - "\"{.number:Hex}\" → calls |U.String.Polyglot.Int.Hex"
    incorrect_fragments:
      - "|DT.Now (missing \"\")"
      - "|DT.Minutes(5) (function call syntax)"
      - "|DT.ToNow(.start) (parentheses not allowed)"
    complete_example: |
      [|] |Example
      [i] .start_time: pg\\dt
      [i] .count: pg\\int
      [t] |T.Call
      [W] |W.Polyglot.Scope

      [r] .greeting: pg\\string << "hello"        # String literal → U.String"hello"
      [r] .now: pg\\dt << |DT.Now""                # Inline pipeline
      [r] .offset: pg\\dt << |DT.Minutes"5"        # Inline pipeline with param
      [r] .elapsed: pg\\string << |DT.ToNow"{.start_time}"  # With interpolation
      [r] .hex: pg\\string << "{.count:Hex}"      # Format string

      [o] .greeting: pg\\string
      [X]

    return_types: "Can return ANY type: pg\\string, pg\\dt, pg\\int, etc."
    reference: "/docs/technical/string-literals-internals.md"

  string_literals:
    critical: "String literals ARE inline pipeline calls, not primitive values"
    delimiter: "\""
    escape_sequences: ["\\\"", "\\n", "\\t", "\\\\"]
    interpolation:
      pattern: "{.variable}" or "{.variable:format}"
      format_examples:
        - "Hex - hexadecimal"
        - "Binary - binary"
        - "Decimal - decimal with commas"
        - "Currency - currency format"
        - "Percent - percentage"
        - "ShortDate - short date format"
    auto_await: "Interpolated variables trigger auto-await if Pending"
    processing:
      step_1: "Extract {.var:fmt} placeholders"
      step_2: "Pack into pg\\array{pg\\serial} with value/format pairs"
      step_3: "Call |U.String.{language}.{type}.{fmt} for each"
      step_4: "Substitute formatted results back"
      step_5: "Pass to pipeline as .formatted_argument_string"

  block_markers:
    case_sensitive: true
    valid: "[|]"
    invalid: ["[L]", "[l]", "(|)"]

# ==============================================================================
# REMOVED FEATURES (v0.0.2)
# ==============================================================================

removed_in_v0_0_2:
  maps:
    type: "pg\\map{K,V}"
    status: "REMOVED"
    replacement: "pg\\serial or #Enumeration"
    migration:
      from: "pg\\map{pg\\string, pg\\int}"
      to: "pg\\serial"

  old_enumerations:
    "#Variables.States":
      status: "DEPRECATED"
      replacement: "#PgVar.States"

    "#Bool":
      status: "DEPRECATED"
      replacement: "#Boolean"

# ==============================================================================
# RESERVED NAMESPACE CONSTRAINTS
# ==============================================================================

reserved_namespaces:
  ".*.pgvar.*":
    description: "Reserved for variable metadata"
    always_ready: true
    user_modification: "FORBIDDEN"
    fields: [".pgvar.state", ".pgvar.errors", ".pgvar.history"]

  "#PgVar":
    description: "Reserved for Polyglot runtime enumerations"
    user_modification: "FORBIDDEN"

  "#Boolean":
    description: "Reserved boolean enumeration"
    user_modification: "FORBIDDEN"

  "#None":
    description: "Reserved unit type"
    user_modification: "FORBIDDEN"

# ==============================================================================
# EDGE CASES
# ==============================================================================

edge_cases:
  empty_collections:
    valid: true
    example: "[<] .items: pg\\array{pg\\int} << {}"
    type_inference: "Element type from declaration, not from literal"

  recursive_depth:
    constraint: "No hard limit (runtime dependent)"
    recommendation: "Avoid excessive depth (>100 levels)"

  unicode_identifiers:
    support: "UTF-8 supported"
    constraint: "Must start with letter or underscore"
    example: ".用户名"

  operator_precedence:
    note: "Polyglot has minimal expression syntax"
    precedence: "Operators evaluated left-to-right within block context"

# ==============================================================================
# MANDATORY PIPELINE SECTIONS
# ==============================================================================

pipeline_structure:
  rule: "Every [|] pipeline MUST have ALL mandatory sections in correct order"
  severity: "ERROR"

  execution_workflow:
    description: "Runtime execution order (different from declaration order)"
    flow: "[t],[i] → [\\],[Q] → [r],{[p],[Y]},[b],[s] → [/] → [o] → [X]"
    steps:
      1_trigger_and_inputs: "Triggers fire, inputs provided by caller"
      2_setup_and_queue: "Setup runs, queue configured (if present)"
      3_execution: "Execution blocks run (sequential, parallel, background, serial file I/O)"
      4_cleanup: "Cleanup runs (RAII-style or explicit)"
      5_outputs: "Outputs returned to caller"
      6_complete: "Pipeline execution complete"
    note: "Declaration order in file != execution order at runtime"

  package_declaration:
    marker: "[@]"
    requirement: "MANDATORY at file level (before any pipeline definitions)"
    syntax: "@{Registry}::{FullName}:{Major}.{Minor}.{Patch}.{Draft}"
    severity: "ERROR"

    format_specification:
      registry:
        prefix: "@"
        description: "Registry name (Local, GitHub, Private, etc.)"
        examples: ["@Local", "@GitHub", "@Private"]
        required: true

      separator:
        symbol: "::"
        description: "Separates registry from package full name"
        note: "Changed from @ to :: in syntax update"

      full_name:
        format: "Namespace.Package"
        description: "Dot-separated hierarchical package name"
        examples: ["Examples.HelloWorld", "username.project", "Internal.Tools"]
        case: "CamelCase recommended"

      version:
        separator: ":"
        format: "Major.Minor.Patch.Draft"
        description: "Four-part semantic version"
        examples: ["1.0.0.0", "2.3.1.0", "0.1.0.5"]
        required: true
        parts:
          major: "Breaking changes"
          minor: "New features (backward compatible)"
          patch: "Bug fixes"
          draft: "Draft/preview version (0 = stable)"

    complete_examples:
      local_package:
        syntax: "[@] @Local::Examples.HelloWorld:1.0.0.0"
        description: "Local development package"

      github_package:
        syntax: "[@] @GitHub::username.project:2.3.1.0"
        description: "Package from GitHub registry"

      private_package:
        syntax: "[@] @Private::Internal.Tools:1.0.0.5"
        description: "Private organizational package"

    deprecated_syntax:
      old_format: "{Registry}@{FullName}:{Version}"
      old_example: "Local@Examples.HelloWorld:1.0.0.0"
      error_message: "Package syntax updated - use @Registry::Name:Version format"
      migration: "Add @ prefix and change @ separator to ::"

    usage_in_file:
      code: |
        [@] @Local::MyPackage:1.0.0.0
        [X]

        [|] |MyFirstPipeline
        [i] .input: pg\\string
        [t] |T.Call
        [W] |W.Polyglot.Scope
        [r] .result: pg\\string << "Hello, {.input}!"
        [o] .result: pg\\string
        [X]

    validation_rules:
      - "Registry must start with @ prefix"
      - "Registry and FullName separated by ::"
      - "FullName and Version separated by :"
      - "Version must be four parts: Major.Minor.Patch.Draft"
      - "All version parts must be non-negative integers"
      - "Package declaration must come before pipeline definitions"
      - "One package declaration per file"

    common_errors:
      missing_prefix:
        wrong: "[@] Local::Package:1.0.0.0"
        correct: "[@] @Local::Package:1.0.0.0"
        error: "Missing @ prefix on registry name"

      wrong_separator:
        wrong: "[@] @Local@Package:1.0.0.0"
        correct: "[@] @Local::Package:1.0.0.0"
        error: "Use :: separator between registry and package name"

      missing_draft:
        wrong: "[@] @Local::Package:1.0.0"
        correct: "[@] @Local::Package:1.0.0.0"
        error: "Version must have four parts (Major.Minor.Patch.Draft)"

  mandatory_order:
    1_inputs:
      marker: "[i]"
      requirement: "At least one input"
      default_if_none: "[i] !No.Input"
      examples:
        - "[i] .data: pg\\string"
        - "[i] .count: pg\\int <~ 10"
        - "[i] !No.Input"

    2_triggers:
      marker: "[t]"
      requirement: "At least one trigger"
      critical: "Pipeline will NEVER run without triggers"
      common_triggers:
        manual_call: "[t] |T.Call"
        cron: "[t] TG.Cron\"\""
        file_watch: "[t] TG.FileWatch\"\""
        http: "[t] TG.HTTP\"\""
      examples:
        - "[t] |T.Call"
        - "[t] TG.Cron\"0 0 * * *\""
      notes:
        - "If pipeline is called via |PipelineName, MUST have [t] |T.Call"

    3_queue_config:
      marker: "[Q]"
      requirement: "Optional"
      examples:
        - "[Q]"
        - "[Q] [<] .priority: pg\\int << 1"

    4_wrapper_section:
      requirement: "MANDATORY - Final pipeline render MUST have wrapper components"
      severity: "ERROR - Compiler enforces this"

      safety_mechanism:
        purpose: "Forces explicit acknowledgment of wrapper/setup/cleanup section"
        prevents: "Accidental omission of required wrappers (e.g., forgetting [W] |W.RT.Python3.14)"
        philosophy: "Similar to 'fall-through' comments - requires intentional acknowledgment"

      three_valid_options:
        option_1_runtime_wrapper:
          marker: "[W]"
          syntax: "[W] |W.RT.Python3.14 or [W] |W.RT.Rust1.8, etc."
          includes: "Implicit setup/cleanup for runtime environment"
          when: "Calling external code (Python, Rust, Node, Go)"
          examples:
            - "[W] |W.RT.Python3.14    # Python runtime wrapper"
            - "[W] |W.RT.Rust1.8       # Rust runtime wrapper"
            - "[W] |W.RT.Nodejs        # Node.js runtime wrapper"
            - "[W] |W.DB.Postgresql    # Database wrapper"

        option_2_explicit_setup_cleanup:
          markers: "[\\] setup and [/] cleanup"
          when: "Custom setup/cleanup logic needed"
          replaces_wrapper: "If [\\] and [/] exist, [W] is NOT required"
          examples:
            - code: |
                [\\]
                [r] .setup_var: pg\\int << 0
                [/]
              note: "Explicit setup/cleanup - no [W] needed"

        option_3_safety_placeholder:
          marker: "[W]"
          syntax: "[W] |W.Polyglot.Scope"
          purpose: "SAFETY PLACEHOLDER - explicitly says 'no wrapper needed'"
          when: "Intentionally no external runtime or custom setup/cleanup"
          why_required: "Prevents accidentally forgetting wrapper when it IS needed"
          does_nothing: "Scope management happens implicitly anyway - this is just acknowledgment"
          examples:
            - code: |
                [|] |SimplePipeline
                [i] .input: pg\\string
                [t] |T.Call
                [W] |W.Polyglot.Scope    # Safety placeholder - intentionally no wrapper
                [r] .result: pg\\string << .input
                [o] .result: pg\\string
                [X]
              note: "No external code called - explicitly using Polyglot.Scope"

      compiler_enforcement:
        rule: "Final rendered pipeline MUST have ONE of the three options above"
        check: "[\] + [/] present OR [W] marker present"
        error_if_missing: "Pipeline missing wrapper section - add [W] or [\\]+[/]"
        examples:
          valid_complete:
            - "[W] |W.RT.Python3.14"
            - "[\\] ... [/]"
            - "[W] |W.Polyglot.Scope"
          invalid_missing:
            code: |
              [|] |BadPipeline
              [i] !No.Input
              [t] |T.Call
              # ERROR: No [W] and no [\]+[/] - compiler error!
              [o] !No.Output
              [X]
            error: "Wrapper section missing - must have [W] or [\\]+[/]"

      partial_examples:
        rule: "Partial examples can use '...' to omit wrapper when not the focus"
        when: "Teaching concept unrelated to wrappers"
        markers:
          - "..."
          - "// ... rest of pipeline ..."
          - "// ... wrapper section ..."
        example:
          code: |
            [|] |TeachingConditionals
            [i] .x: pg\\int
            [t] |T.Call
            // ... rest of pipeline ...
            [?] .x >? 10
            [~][r] .result: pg\\string << "high"
            [~]
            // ...
            [X]
          note: "Wrapper omitted with '...' because focus is on conditionals"
        complete_version_must_have:
          - "Full examples MUST show [W] or [\\]+[/]"
          - "Cannot omit in production code"
          rule: "[W] marker CANNOT be blank"
          invalid: "Missing [W] entirely"
          valid: "Always declare at least |W.Polyglot.Scope"

    5_execution_blocks:
      markers: "[r], {[p],[Y]}, [b], [s]"
      requirement: "Optional (but usually present)"
      types:
        sequential: "[r]"
        parallel: "{[p],[Y]}"
        background: "[b]"
        serial: "[s]"
      execution_order:
        note: "Blocks run during execution phase: [\],[Q] → execution → [/]"
        parallel_with_join: "[p] runs parallel tasks, [Y] joins results"

    6_outputs:
      marker: "[o]"
      requirement: "At least one output"
      default_if_none: "[o] !No.Output"
      examples:
        - "[o] .result: pg\\string"
        - "[o] #StatusCode"
        - "[o] !No.Output"

  invalid_examples:
    missing_triggers:
      code: |
        [|] |MissingTriggers
        [i] .data: pg\\string
        [W] |RT.Python\"process.py\"
        [o] .result: pg\\string
        [X]
      error: "Pipeline will NEVER run - no triggers defined"
      fix: "Add [t] |T.Call or other trigger"

    missing_wrapper_and_setup:
      code: |
        [|] |MissingSetup
        [i] .data: pg\\string
        [t] |T.Call
        [r] .result: pg\\string << .data
        [o] .result: pg\\string
        [X]
      error: "No wrapper [W] and no setup/cleanup [\\][/]"
      fix: "Add [W] wrapper OR add [\\][/] explicit setup/cleanup"

    missing_input_declaration:
      code: |
        [|] |MissingInput
        [t] |T.Call
        [W] |RT.Python\"process.py\"
        [o] !No.Output
        [X]
      error: "No inputs declared"
      fix: "Add [i] !No.Input if no inputs needed"

    missing_output_declaration:
      code: |
        [|] |MissingOutput
        [i] .data: pg\\string
        [t] |T.Call
        [W] |RT.Python\"process.py\"
        [X]
      error: "No outputs declared"
      fix: "Add [o] !No.Output if no outputs needed"

  valid_minimal_pipeline:
    code: |
      [|] |MinimalPipeline
      [i] !No.Input
      [t] |T.Call
      [W] |W.Polyglot.Scope
      [o] !No.Output
      [X]
    description: "Absolute minimum valid pipeline structure (no setup/cleanup)"

  valid_full_pipeline:
    code: |
      [|] |FullPipeline
      [i] .data: pg\\string
      [i] .count: pg\\int <~ 10
      [t] |T.Call
      [t] |TG.Cron\"0 0 * * *\"
      [Q]
      [<] .priority: pg\\int << 1
      [W] |RT.Python\"process.py\"
      [r] .result: pg\\string << .data
      [o] .result: pg\\string
      [X]
    description: "Complete pipeline with all sections"

# ==============================================================================
# DOCUMENTATION STANDARDS
# ==============================================================================

documentation_standards:
  hierarchy_trees:
    rule: "ALL hierarchical structures MUST include ASCII tree diagrams"
    rationale: "Polyglot data has serial hierarchy - trees make structure clear"
    applies_to:
      - "Variable namespaces (.variable.field.subfield)"
      - "Pipeline namespaces (|DT.Gregorian.November.Fourth.Thursday)"
      - "Enumeration fields (#Enum.variant.nested)"
      - "Error hierarchies (!Network.HTTP.4xx.NotFound)"
      - "Block element nesting ([|] → [i] → [t] → [W] → [r] → [o])"
      - "Reserved namespaces (.*.pgvar.*, #PgVar.States.*)"
      - "Type hierarchies (pg\*, py\*, rs\*)"

    required_elements:
      - "ASCII tree diagram using │ ├─ └─ symbols"
      - "Inline comments for each tree node"
      - "Extendability markers (*) for user-extendable namespaces"
      - "Type annotations for serial fields"
      - "Depth indication via consistent indentation"
      - "Practical usage examples after tree"

    reference: "/docs/technical/hierarchy-tree-notation.md"

    examples:
      variable_tree: |
        .user: pg\\serial               // User data (with type)
        │
        ├─ .user.name: pg\\serial       // Name fields (nested serial)
        │   ├─ .user.name.first: pg\\string
        │   └─ .user.name.last: pg\\string
        └─ .user.pgvar.*                // Reserved metadata (ALWAYS Ready)
            └─ .user.pgvar.state: #PgVar.States.*

      pipeline_tree: |
        |DT.*                           // DateTime namespace (| prefix)
        │
        ├─ |DT.Now                      // Current instant → pg\\dt
        └─ |DT.Gregorian.*              // Gregorian calendar
            └─ |DT.Gregorian.Yearly     // Yearly recurrence → pg\\dt

      enumeration_tree: |
        #UserProfile                    // User enumeration (# prefix)
        │
        ├─ #UserProfile.role.*          // Role variants (enum namespace)
        │   ├─ #UserProfile.role.Admin  // Enum field (NO type)
        │   └─ #UserProfile.role.User   // Enum field (NO type)
        └─ #UserProfile.email: pg\\string  // Serial field (HAS type)

      unpack_operators: |
        ~ForEach                        // Unpack operator (~ prefix)
        ~Enumerate                      // Iterate with index
        ~Zip                            // Zip collections

      join_operators: |
        ~Y.IntoArray                    // Join operator (~Y prefix)
        ~Y.IntoSet                      // Pack into set
        ~Y.IntoSerial                   // Pack into serial

      error_tree: |
        !Network.*                      // Error namespace (! prefix)
        │
        ├─ !Network.Timeout.*
        │   └─ !Network.Timeout.Connection
        └─ !Network.HTTP.*
            └─ !Network.HTTP.4xx.*
                └─ !Network.HTTP.4xx.NotFound

# ==============================================================================
# VALIDATION CHECKLIST
# ==============================================================================

validation_checklist:
  syntax:
    - "All identifiers have operator prefix (. # | !)"
    - "Type separator is \\ (backslash)"
    - "Block markers are case-sensitive"
    - "Strings use double quotes"

  semantics:
    - "No nested collections directly"
    - "Enum/serial fields not siblings"
    - "Exhaustive conditions with [?] *?"
    - "Reserved namespaces not modified"
    - "Every [|] has inputs [i], triggers [t], wrapper/setup, outputs [o]"

  types:
    - "Correct type separator (\\)"
