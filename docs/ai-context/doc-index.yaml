# Core concepts cross-reference
concepts:
  block-markers:
    docs: [block-markers.md, overview.md]
    key_markers: ['[@]', '[|]', '[#]', '[!]', '[M]', '[X]', '[i]', '[o]', '[<]', '[>]', '[r]', '[p]', '[b]', '[s]', '[Y]', '[?]', '[t]', '[Q]', '[W]', '[~]', '[A]', '[\]', '[/]', '[{]', '[}]', '[&]', '[+]', '[-]', '[^]', '[.]', '[*]']
    related: [syntax overview, pipeline structure, execution semantics]

  variable-states:
    docs: [variable-states.md, variable-state-system.md, variable-states-specification.md, enumerations.md]
    states: [Declared, DefaultReady, Pending, Ready, Faulted]
    transitions: [auto on ops, no manual mgmt]
    related: [async-centric, operators, [i] trigger]

  async-paradigm:
    docs: [async-centric-paradigm.md, variable-state-system.md, parallel-execution.md]
    features: [no-await, state-driven, auto-concurrent, PULL-waits]
    related: [var-states, pipelines, [p] parallel]

  operators:
    docs: [operators.md, block-markers.md]
    data-flow: ['<<' push, '>>' pull, '<~' default]
    comparison: ['=?', '>?', '<?', '>=?', '<=?', '!?']
    range: ['?[a,b]', '?[a,b)', '?(a,b]', '?(a,b)']
    collection: ['~*' unpack, '~Y.*' pack]
    related: [state-transitions, type-system]

  pipelines:
    docs: [overview.md, block-markers.md, multi-step-pipelines.md]
    structure: ['[|]' def, '[i]' input, '[t]' trigger, '[W]' wrapper, exec blocks, '[o]' output, '[X]' term]
    execution: ['[r]' seq, '[p]' parallel, '[b]' bg, '[s]' serial]
    control: ['[?]' switch, '[Q]' queue]
    related: [state-system, triggers, wrappers]

  error-handling:
    docs: [error-handling.md, error-handling-patterns.md]
    define: ['[!]' ErrorName, required fields .message/.code/.trace]
    catch: ['[~][!]' catch block, catch-all [~][!] *]
    propagate: ['[o]' !ErrorType]
    markers: ['!No.Input', '!No.Output']
    related: [Faulted state, patterns]

  types:
    docs: [type-system.md, enumerations.md]
    namespaces: ['pg\', 'rs\', 'py\', 'js\', 'go\']
    primitives: [int, float, string, bool, path, url, datetime]
    collections: ['array{T}', 'map{K,V}', 'set{T}']
    enums: ['#Boolean', '#None', '#PgVar.States.*']
    related: [FFI, cross-lang-integration]

  datetime:
    docs: [datetime-system.md, datetime-architecture-decision-2025-12-02.md]
    base: Unix-timestamp-ms
    calendars: [Gregorian, Julian-Date, future-Hijri]
    triggers: ['|T.DT.Daily', '|T.DT.Every', '|T.DT.Cron']
    storage: InfluxDB-temporal-records
    related: [triggers, temporal-profiles]

  multi-lang:
    docs: [cross-language-integration.md, type-system.md]
    wrappers: ['RT.Python', 'RT.Rust', 'RT.Node', 'RT.Go']
    type-mapping: [pg↔rs↔py↔js↔go]
    related: [namespaces, FFI, runtime-wrappers]

