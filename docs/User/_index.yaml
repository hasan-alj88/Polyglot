_schema: polyglot-doc-index-v1

directory:
  path: User
  audience: user
  description: "Documentation for Polyglot language users"
  parent: _index.yaml

files: []
# Legacy files exist but are not yet indexed.
# Files will be added to this index as they are created or migrated.
# Run: python scripts/doc-reindex.py docs/User/ --update
# to generate skeleton entries for existing files.

subdirectories:
  - path: getting-started/
    description: "Tutorials and first steps for new users"
    index: User/getting-started/_index.yaml

  - path: language/
    description: "Language syntax and semantics guides"
    index: User/language/_index.yaml

  - path: examples/
    description: "Working code examples"
    index: User/examples/_index.yaml

  - path: reference/
    description: "Quick reference and grammar"
    index: User/reference/_index.yaml

  - path: specifications/
    description: "Formal language specifications (v0.0.4)"
    index: User/specifications/_index.yaml

  - path: stdlib/
    description: "Standard library reference"
    index: User/stdlib/_index.yaml
