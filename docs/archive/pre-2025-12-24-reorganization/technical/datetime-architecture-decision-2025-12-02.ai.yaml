topic: DateTime Architecture Decision Record
kw: [ADR, architecture-decision, Unix-timestamp, datetime, MD-rejected, JD, temporal-profiles, InfluxDB]
sum: ADR: Use Unix timestamp (ms) as base datetime format instead of custom MD (Millennium Date); temporal profiles for calendar conversions
pts:
  - Decision: Unix timestamp milliseconds (1970 epoch UTC)
  - Rejected: Millennium Date (MD) custom format with 2000 epoch
  - Rationale: universal ecosystem support, native DB support, battle-tested
  - Temporal profiles: data-driven calendar conversion (Gregorian, JD, future Hijri)
  - InfluxDB: native time-series with precision=ms
  - Innovation: temporal profile system, not time format
  - Timeline: ~4 weeks MVP (Gregorian + JD + Unix ms)
rels: [datetime-system.md, architecture.md]
