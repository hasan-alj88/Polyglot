# Incident Ticket - Comparison Operators Syntax Violations

ticket_id: INC-2025-001
type: incident
title: "Comparison Operators - 12 Syntax Violations in v0.0.2 Docs"
description: |
  BLOCKING INCIDENT: 12 instances in v0.0.2 documentation use comparison operators
  (==, !=, <, >, <=, >=) which may not exist in Polyglot syntax.

  According to Nov 13 audit: "Comparison operators DON'T exist - use range notation"
  However, code violations log (Violation #7) suggests they DO exist but named operations are preferred.

  CONFLICTING INFORMATION - Need authoritative decision.

  Files Affected (12 violations):
  - language/02-type-system.md (2 instances)
  - language/08-parallel-execution.md (2 instances)
  - language/10-pipeline-lifecycle.md (2 instances)
  - standard-library/02-queue-control.md (4 instances)
  - standard-library/03-utilities-catalog.md (2 instances)

  Example Violations:
  - [?] .condition == True  (should be: [?] .condition ?> True)
  - current_load > 80       (should be: current_load ?> 80..)
  - current_state == "Running"  (should be: current_state ?> "Running")

