# Polyglot DateTime System - AI Context Reference
# Version: 0.0.2
# Last Updated: 2025-11-30
# Purpose: Machine-parseable DateTime specification

version: "0.0.2"
updated: "2025-11-30"
source_brainstorming: "docs/project/brainstorming-session-results-2025-11-29.md"

# ============================================
# TYPE DEFINITION
# ============================================

primitive_type:
  name: "pg\\dt"
  category: "primitive"
  description: "DateTime type with calendar, timezone, and recurrence support"
  default_value: null  # No default, must be explicitly initialized

internal_structure:
  rust_definition: |
    pub struct DateTime {
        pattern: DateTimePattern,  // Once or Recurrence
        value: DateTimeValue,       // One of 7 variants
        type_: DateTimeType,        // Instant or Duration
    }

  pattern:
    type: "DateTimePattern"
    variants:
      - name: "Once"
        description: "Single occurrence"
      - name: "Recurrence"
        description: "Repeating pattern"
        fields:
          count: "Option<u32>"  # None = unlimited

  value:
    type: "DateTimeValue"
    variants:
      - name: "TimeOnly"
        fields: ["Time"]
        example: "DT.Time\"12:00PM\""
      - name: "DateOnly"
        fields: ["Date"]
        example: "DT\"2025-11-30\""
      - name: "DayOfWeekOnly"
        fields: ["DayOfWeek"]
        example: "DT.Weekly\"Monday\""
      - name: "TimeAndDate"
        fields: ["Time", "Date"]
        example: "DT\"2025-11-30 3:00PM\""
      - name: "TimeAndDayOfWeek"
        fields: ["Time", "DayOfWeek"]
        example: "DT.Daily\"Monday 9:00AM\""
      - name: "DateAndDayOfWeek"
        fields: ["Date", "DayOfWeek"]
        example: "DT\"2025-11-30 Sunday\""
        validation: "ICU4X validates date matches day"
      - name: "All"
        fields: ["Time", "Date", "DayOfWeek"]
        example: "DT\"2025-11-30 Sunday 3:00PM\""
        validation: "ICU4X validates all components"

  type_enum:
    type: "DateTimeType"
    variants:
      - name: "Instant"
        description: "Point in time"
      - name: "Duration"
        description: "Time interval"
        fields:
          units: "DurationUnits"

# ============================================
# VARIABLE STATE INTEGRATION
# ============================================

state_machine:
  states:
    - Declared     # Type defined, no value
    - Default      # Has default value, 1 override allowed
    - Ready        # Final immutable value
    - Error        # Operation failed
    - Close        # Out of scope

  examples:
    declared: "[<] .dt: pg\\dt"
    default: "[<] .dt: pg\\dt <~ DT.Now\"\""
    ready: "[<] .dt: pg\\dt << DT\"2025-11-30\""

# ============================================
# LITERAL SYNTAX PATTERNS
# ============================================

literal_syntax:
  base_pattern: "DT\"formatted_string\""
  calendar_pattern: "DT.{Calendar}\"formatted_string\""
  profile_pattern: "DT.{Calendar}.{Profile}\"formatted_string\""
  operation_pattern: "DT.{Operation}\"formatted_string\""

  mandatory_rules:
    - "Time formats MUST include AM/PM or use 24-hour format"
    - "Duration units MUST be in descending order"
    - "No decimal durations (use \"2h 30m\" not \"2.5h\")"
    - "No negative durations (use DT.Ago\"2h\" not \"-2h\")"

  date_formats:
    iso8601: "DT\"2025-11-30\""
    full_day: "DT\"2025-11-30:\""  # 00:00 to 23:59:59
    wildcards:
      year: "DT\"*-11-30\""      # Every Nov 30
      month: "DT\"2025-*-15\""   # 15th of every month
      day: "DT\"2025-11-*\""     # Every day in Nov

  time_formats:
    hour_24:
      - "DT.Time\"15:00\""
      - "DT.Time\"15:00:30\""
      - "DT.Time\"15:00:30.500\""
    hour_12:
      - "DT.Time\"3:00PM\""
      - "DT.Time\"3PM\""
      - "DT.Time\"12:00AM\""
      - "DT.Time\"12AM\""
    midnight_valid:
      - "DT.Time\"00:00\""    # ISO 8601 start
      - "DT.Time\"24:00\""    # ISO 8601 end
      - "DT.Time\"12:00AM\""  # 12-hour
      - "DT.Time\"12AM\""     # Hour only
    invalid:
      - "DT.Time\"3:00\""     # ERROR: Ambiguous!

  duration_formats:
    units: ["y", "mo", "w", "d", "h", "m", "s"]
    ordering: "descending"  # y > mo > w > d > h > m > s
    examples:
      valid:
        - "DT\"30s\""
        - "DT\"2h 30m\""
        - "DT\"1y 3mo 2w\""
        - "DT\"2h 30m 15s\""
      invalid:
        - "DT\"30m 2h\""     # ERROR: Wrong order
        - "DT\"2.5h\""       # ERROR: No decimals
        - "DT\"-2h\""        # ERROR: Use DT.Ago\"2h\"

# ============================================
# DT.* PIPELINE NAMESPACE
# ============================================

pipeline_namespace:
  core:
    - name: "DT\"\""
      description: "Parse formatted string"
      returns: "pg\\dt"
    - name: "DT.Now\"\""
      description: "Current instant"
      returns: "pg\\dt"
    - name: "DT.Time\"...\""
      description: "Time only"
      returns: "pg\\dt (TimeOnly)"
    - name: "DT.Date\"...\""
      description: "Date only"
      returns: "pg\\dt (DateOnly)"

  temporal_navigation:
    - name: "DT.Ago\"duration\""
      description: "Past time from now"
      param: "duration string"
      returns: "pg\\dt (Instant)"
    - name: "DT.From.Now\"duration\""
      description: "Future time from now"
      param: "duration string"
      returns: "pg\\dt (Instant)"
    - name: "DT.Add\"duration\""
      description: "Add duration to instant"
      returns: "pg\\dt (Instant)"
    - name: "DT.Subtract\"duration\""
      description: "Subtract duration from instant"
      returns: "pg\\dt (Instant)"

  recurring_patterns:
    - name: "DT.Daily\"time\""
      description: "Every day at time"
      pattern: "Recurrence"
    - name: "DT.Weekly\"day time\""
      description: "Every week on day at time"
      pattern: "Recurrence"
    - name: "DT.Monthly\"day time\""
      description: "Monthly on day at time"
      pattern: "Recurrence"
    - name: "DT.Yearly\"month day\""
      description: "Annual on date"
      pattern: "Recurrence"
    - name: "DT.Every.{Unit}\"\""
      units: ["Second", "Minute", "Hour", "Day", "Week", "Month", "Year"]
      pattern: "Recurrence"

  relative_dates:
    pattern: "DT.{Calendar}.{Month}.{Occurrence}.{DayOfWeek}\"\""
    occurrences: ["First", "Second", "Third", "Fourth", "Fifth", "Last"]
    examples:
      - "DT.Gregorian.November.Fourth.Thursday\"\""  # US Thanksgiving
      - "DT.Gregorian.September.First.Monday\"\""    # US Labor Day
      - "DT.Hijri.SaudiArabia.Ramadan.Last.Friday\"\"" # Last Friday in Ramadan

  operations:
    comparison:
      - "DT.IsBefore\"other\""
      - "DT.IsAfter\"other\""
      - "DT.IsBetween\"start, end\""
      - "DT.Contains\"instant\""
    interval:
      - "DT.Overlaps\"other\""
      - "DT.Intersection\"other\""
      - "DT.Union\"other\""
      - "DT.Gap\"other\""
    extraction:
      - "DT.Year\"\""
      - "DT.Month\"\""
      - "DT.Day\"\""
      - "DT.Hour\"\""
      - "DT.Minute\"\""
      - "DT.Second\"\""
      - "DT.DayOfWeek\"\""
    conversion:
      - "DT.Convert.Hijri\"\""
      - "DT.Convert.Hebrew\"\""
      - "DT.Convert.Chinese\"\""
      - "DT.Convert.Gregorian\"\""
      - "DT.ToUTC\"\""
      - "DT.ToLocal\"\""

# ============================================
# CALENDAR SYSTEMS
# ============================================

calendars:
  algorithmic:
    mvp:
      - name: "Gregorian"
        pattern: "DT\"...\" or DT.Gregorian\"...\""
        description: "Default Western calendar"
        icu4x: true
      - name: "Julian"
        pattern: "DT.Julian\"...\""
        description: "Pre-Gregorian calendar"
        icu4x: true
      - name: "Assyrian"
        pattern: "DT.Assyrian\"...\""
        description: "Syriac calendar (Julian + 311 years)"
        icu4x: true
      - name: "Islamic Civil"
        pattern: "DT.Hijri\"...\""
        description: "Algorithmic Islamic (no profiles)"
        icu4x: true

    post_mvp:
      - "Coptic"
      - "Ethiopian"
      - "Buddhist"
      - "Persian"

  profile_based:
    description: "Community-specific observations vs algorithmic"
    priority_system:
      P1: "Manual Overrides (HR-entered)"
      P2: "API Cache (moon sighting services)"  # POST-MVP
      P3: "ICU4X Calculated (algorithmic)"

    calendars:
      - name: "Islamic (Hijri)"
        base: "DT.Hijri\"...\""
        profiles:
          builtin:
            - name: "SaudiArabia"
              pattern: "DT.Hijri.SaudiArabia\"...\""
              method: "Umm al-Qura"
            - name: "UKMoonSighting"
              pattern: "DT.Hijri.UKMoonSighting\"...\""
              method: "Local moon sighting"
            - name: "Turkey"
              pattern: "DT.Hijri.Turkey\"...\""
              method: "Diyanet"
          user_defined:
            pattern: "DT.Hijri.{UserProfile}\"...\""
            namespace: "#DT.Hijri.*"

      - name: "Hebrew"
        base: "DT.Hebrew\"...\""
        profiles:
          builtin:
            - name: "Sephardic"
              pattern: "DT.Hebrew.Sephardic\"...\""
            - name: "Ashkenazi"
              pattern: "DT.Hebrew.Ashkenazi\"...\""
          user_defined:
            pattern: "DT.Hebrew.{UserProfile}\"...\""
            namespace: "#DT.Hebrew.*"

      - name: "Chinese"
        base: "DT.Chinese\"...\""
        profiles:
          builtin:
            - name: "Mainland"
              pattern: "DT.Chinese.Mainland\"...\""
            - name: "Taiwan"
              pattern: "DT.Chinese.Taiwan\"...\""
          user_defined:
            pattern: "DT.Chinese.{UserProfile}\"...\""
            namespace: "#DT.Chinese.*"

# ============================================
# TIMEZONE SYSTEM
# ============================================

timezones:
  builtin:
    US:
      - "DT.TimeZone.US.Eastern\"...\""
      - "DT.TimeZone.US.Central\"...\""
      - "DT.TimeZone.US.Mountain\"...\""
      - "DT.TimeZone.US.Pacific\"...\""
    Europe:
      - "DT.TimeZone.Europe.London\"...\""
      - "DT.TimeZone.Europe.Paris\"...\""
      - "DT.TimeZone.Europe.Berlin\"...\""
    Asia:
      - "DT.TimeZone.Asia.Tokyo\"...\""
      - "DT.TimeZone.Asia.Shanghai\"...\""
      - "DT.TimeZone.Asia.Dubai\"...\""

  user_defined:
    pattern: "DT.TimeZone.{UserName}\"...\""
    namespace: "#DT.TimeZone.*"
    definition_example: |
      [#] DT.TimeZone.MyCompany
      [<] .gmt_offset: pg\\dt << DT.Ago"3h"
      [<] .dst_offset: pg\\dt << DT"1h"
      [<] .dst_start: pg\\dt << DT"*-03-01"
      [<] .dst_end: pg\\dt << DT"*-09-01"
      [s][!] *
      [X]

# ============================================
# EXTENSION SYSTEM
# ============================================

extensions:
  pattern: |
    [#] DT.{Namespace}.{YourName}
    [~] Initialization logic
    [s] |{pipeline that produces value}
    [s][!] *
    [X]

  extendable_namespaces:
    - namespace: "#DT.TimeZone.*"
      purpose: "Custom timezone definitions"
    - namespace: "#DT.Hijri.*"
      purpose: "Islamic calendar profiles"
    - namespace: "#DT.Hebrew.*"
      purpose: "Hebrew calendar profiles"
    - namespace: "#DT.Chinese.*"
      purpose: "Chinese calendar profiles"
    - namespace: "#DT.Alias.*"
      purpose: "DateTime shortcuts"
    - namespace: "#DT.Holiday.*"
      purpose: "Holiday definitions"
    - namespace: "#DT.Format.*"
      purpose: "Custom format macros"

  examples:
    alias:
      code: |
        [#] DT.Alias.EOD
        [s] |DT.Time"23:59:59"
        [s][!] *
        [X]
      usage: "[<] .deadline: pg\\dt << DT.Alias.EOD"

    holiday:
      code: |
        [#] DT.Holiday.Company
        [<] .founders_day: pg\\dt << DT"2025-03-15"
        [s][!] *
        [X]
      usage: "[?] DT.Now\"\" =? DT.Holiday.Company.founders_day"

# ============================================
# VALIDATION RULES
# ============================================

validation:
  date:
    month_range: "01-12"
    day_range: "01-31 (depends on month and leap year)"
    leap_year: "February 29 only in leap years"
    month_lengths:
      31_days: ["Jan", "Mar", "May", "Jul", "Aug", "Oct", "Dec"]
      30_days: ["Apr", "Jun", "Sep", "Nov"]
      feb: "28 days (29 in leap year)"

  time:
    hour_24: "00-23 (24:00 allowed as end-of-day)"
    hour_12: "1-12 (with AM/PM)"
    minute: "00-59"
    second: "00-59"
    millisecond: "000-999"
    midnight_forms:
      - "00:00"     # ISO start of day
      - "24:00"     # ISO end of day
      - "12:00AM"   # 12-hour
      - "12AM"      # Hour only

  duration:
    ordering: "y > mo > w > d > h > m > s (descending)"
    no_duplicates: "Each unit max once"
    positive_only: "No negatives (use DT.Ago)"
    integer_only: "No decimals"

  wildcard:
    rule: "At least one non-wildcard component"
    valid:
      - "*-03-01"     # Specific month + day
      - "2025-*-15"   # Specific year + day
    invalid:
      - "*-*-*"       # All wildcards

  day_of_week:
    rule: "Date + Day must match"
    validation: "ICU4X calculates day of week"
    examples:
      valid: "DT\"2025-11-30 Sunday\""   # Nov 30 IS Sunday
      invalid: "DT\"2025-11-30 Monday\""  # Nov 30 is NOT Monday

# ============================================
# EQUALITY SEMANTICS
# ============================================

equality:
  instant:
    type: "Exact equality"
    example: "DT\"2025-11-30 15:00\" =? DT\"2025-11-30 15:00\""

  duration:
    type: "Membership test (contains)"
    description: "Is instant inside duration?"
    example: |
      [<] .duration: pg\\dt << DT"2h"
      [<] .point: pg\\dt << DT.Ago"1h"
      [?] @.duration | DT.Contains(@.point)  # true

# ============================================
# COMPARISON OPERATORS
# ============================================

comparison_operators:
  operators:
    - symbol: ">?"
      name: "After"
      example: ".date1 >? .date2"
    - symbol: "<?"
      name: "Before"
      example: ".date1 <? .date2"
    - symbol: "=>?"
      name: "After or equal"
      example: ".date1 =>? .date2"
    - symbol: "=<?"
      name: "Before or equal"
      example: ".date1 =<? .date2"
    - symbol: "=?"
      name: "Equal"
      example: ".date1 =? .date2"
    - symbol: "=!?"
      name: "Not equal"
      example: ".date1 =!? .date2"

# ============================================
# TRIGGER INTEGRATION
# ============================================

triggers:
  pattern: "T.DT.*"
  semantics: "Trigger when DT.* equals DT.Now\"\""
  note: "Examples show SEMANTIC meaning. Actual trigger syntax uses trigger references with config bindings."
  examples:
    - semantic_pattern: "T.Daily\"9:00AM\""
      actual_syntax: |
        [t] |T.Daily
        [<] .time: pg\dt << DT"9:00AM"
      meaning: "Trigger when current time = 9:00AM daily"
    - semantic_pattern: "T.Weekly\"Friday 3:00PM\""
      actual_syntax: |
        [t] |T.Weekly
        [<] .pattern: pg\dt << DT"Friday 3:00PM"
      meaning: "Trigger when current time = Friday 3:00PM weekly"
    - semantic_pattern: "T.DT.Gregorian.November.Fourth.Thursday\"\""
      actual_syntax: |
        [t] |T.DT.Gregorian.November.Fourth.Thursday
      meaning: "Trigger on Thanksgiving (4th Thursday in Nov)"

# ============================================
# MVP SCOPE
# ============================================

mvp_scope:
  included:
    - "pg\\dt primitive type with state machine"
    - "DateTime literals with formatted strings"
    - "7 DateTimeValue variants"
    - "Duration type with ordered units"
    - "Gregorian, Julian, Assyrian, Islamic Civil calendars"
    - "Basic operations (equality, arithmetic, extraction)"
    - "Recurring patterns (Daily, Weekly, Monthly, Yearly)"
    - "Extension system (basic structure)"
    - "Date/DayOfWeek validation (ICU4X)"

  deferred_post_mvp:
    - "Profile loading performance optimization"
    - "API failure handling (timeouts, retries)"
    - "YAML security validation"
    - "Full API integration (Priority 2 in profiles)"
    - "Profile marketplace"
    - "Profile versioning"
    - "Natural language parsing"
    - "Additional calendars (Hebrew, Chinese, Buddhist, Hindu)"

# ============================================
# BEST PRACTICES
# ============================================

best_practices:
  - rule: "Always specify AM/PM or use 24-hour format"
    valid: ["DT.Time\"15:00\"", "DT.Time\"3:00PM\""]
    invalid: ["DT.Time\"3:00\""]

  - rule: "Use appropriate calendar for context"
    valid: "DT.Hijri.SaudiArabia\"1447-09-01\""
    invalid: "DT\"2025-03-30\"  # Should use Hijri"

  - rule: "Use profiles for community calendars"
    valid: "DT.Hijri.MyCompanyHR\"1447-10-01\""
    risky: "DT.Hijri\"1447-10-01\"  # May differ from observed"

  - rule: "Store UTC, display local"
    store: "DT\"2025-11-30T15:00:00Z\""
    display: "@.stored | DT.ToLocal"

  - rule: "Use relative time for dynamic dates"
    dynamic: "DT.Ago\"7d\"  # Always 7 days ago"
    static: "DT\"2025-11-23\"  # Becomes outdated"

  - rule: "Respect duration ordering"
    valid: "DT\"2h 30m 15s\""
    invalid: ["DT\"30m 2h\"", "DT\"2.5h\""]

  - rule: "Use dot hierarchy for relative dates"
    valid: "DT.Gregorian.November.Fourth.Thursday\"\""
    invalid: "DT\"Fourth Thursday in November\""

