# ============================================
# QUICK REFERENCE
# ============================================

quick_reference:
  type: "pg\\dt"

  declaration:
    - "[<] .dt: pg\\dt"                         # Declared
    - "[<] .dt: pg\\dt <~ DT.Now\"\""           # Default
    - "[<] .dt: pg\\dt << DT\"2025-11-30\""     # Ready

  literals:
    date: "DT\"2025-11-30\""
    time: "DT.Time\"15:00\""
    datetime: "DT\"2025-11-30 15:00\""
    duration: "DT\"2h 30m\""
    recurring: "DT.Daily\"9:00AM\""

  calendars:
    gregorian: "DT\"2025-11-30\""
    hijri_algo: "DT.Hijri\"1447-09-01\""
    hijri_profile: "DT.Hijri.SaudiArabia\"1447-09-01\""

  operations:
    add: "@.start | DT.Add\"7d\""
    compare: ".date1 >? .date2"
    extract: "@.dt | DT.Year"
    convert: "@.greg | DT.Convert.Hijri"

  extensions:
    timezone: "DT.TimeZone.MyCompany\"...\""
    alias: "DT.Alias.EOD"
    holiday: "DT.Holiday.Company.founders_day"

# ============================================
# CRITICAL RULES
# ============================================

critical_rules:
  - "Time MUST have AM/PM or 24-hour format (no \"3:00\")"
  - "Duration units MUST be descending order (no \"30m 2h\")"
  - "No decimal durations (use \"2h 30m\" not \"2.5h\")"
  - "No negative durations (use DT.Ago\"2h\" not \"-2h\")"
  - "DateAndDayOfWeek variants validated by ICU4X"
  - "Profile system uses 3-tier priority (Manual → API → ICU4X)"
  - "T.DT.* triggers when DT.* equals DT.Now\"\""
  - "All DateTime literals are string literal pipeline calls"
  - "Wildcard patterns require at least one non-wildcard component"
  - "Relative dates use dot hierarchy (no natural language)"
