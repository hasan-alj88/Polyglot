topic: Async-Centric Paradigm
kw: [async-first, paradigm, no-await, state-driven, pipeline, concurrent]
sum: Polyglot async-centric philosophy: no explicit await, state-driven execution, pipeline orchestration, auto concurrency
pts:
  - Core: async by default, not opt-in
  - No await keyword: state system handles implicitly
  - PULL triggers wait: >> blocks until Ready
  - Pipeline orchestration: natural async composition
  - Concurrent: [p] parallel by declaration
  - State-driven: FSM manages execution flow
  - User focus: what to do, not when/how to sync
