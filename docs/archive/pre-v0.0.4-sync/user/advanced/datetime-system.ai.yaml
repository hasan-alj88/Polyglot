topic: DateTime System
kw: [datetime, DT, Unix-timestamp-ms, temporal, calendar, JD, Gregorian, triggers, scheduling]
sum: DateTime sys using Unix timestamp (ms) as base; Gregorian+JD calendars via temporal profiles; DT"" literals, triggers, scheduling
pts:
  - Base: Unix timestamp milliseconds (1970 epoch)
  - Literals: DT"2024-03-15", DT"YYYY-MM-DD HH:MM:SS"
  - Calendars: Gregorian, Julian Date, future: Hijri/Hebrew
  - Temporal profiles: data-driven calendar conversion
  - Triggers: |T.DT.Daily, |T.DT.Every, |T.DT.Cron
  - Precision: millisecond throughout
  - InfluxDB storage for temporal records
