topic: Syntax Overview & Core Principles
kw: [syntax, overview, pipeline, async-first, multi-lang, block-markers, no-keywords, zero-indent, state-system]
sum: High-level overview of Polyglot syntax: pipeline orchestration lang with 3-char block markers, no keywords/indent, async-centric var states, multi-lang FFI
pts:
  - Pipeline orchestration for multi-lang async execution
  - No keywords: identifiers use prefixes . # | !
  - No indentation: [x] markers define structure
  - Async state: Declared → Pending → Ready|Faulted
  - No explicit await, auto-handle on PULL
  - Type ns: pg\ rs\ py\ etc with backslash sep
  - Zero-column rule: all lines start col 0
  - Mandatory pipeline struct: [i][t][W|[\][/]][exec][o]
  - Operator prefixes: . var, # enum, | pipeline, ! error
  - State transitions automatic, no manual management
