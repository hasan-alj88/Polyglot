## Validation Rules

### Compile-Time Validation

Compiler validates:
1. All required fields present in implementation
2. Field types match schema specification
3. No extra fields beyond required + optional

**Error Example:**
```polyglot
{#} #IncompleteDB-DB-Settings
[s] << |TOML.Load"config.toml"
   [.] .host << .host
   [.] .port << .port
   %% ERROR: Missing required fields: username, password, database
[s][!] !*
{x}
```

### Runtime Validation

Wrapper validates:
1. Non-empty required string fields
2. Port number in valid range (1-65535)
3. SSL certificate exists if SSL enabled
4. Pool sizes are logical (min ≤ max)

---

## Security Considerations

### Password Handling

❌ **Never hardcode passwords:**
```polyglot
[.] .password << "hardcoded_password"  %% WRONG!
```

✅ **Load from secure configuration:**
```polyglot
[s] << |TOML.Load"\\FileDir\\config\database.toml"
   [.] .password << .credentials.password_from_vault
```

✅ **Use environment variables:**
```polyglot
[s] << |Env.Load""
   [.] .password << .DB_PASSWORD
```

### SSL/TLS

For production environments, enable SSL:
```polyglot
[.] .ssl_enabled << true
[.] .ssl_ca_cert << "\\FileDir\\certs\ca.crt"
```

