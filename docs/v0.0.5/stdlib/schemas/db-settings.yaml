## Database-Specific Extensions

### PostgreSQL Specifics

```polyglot
{#} #PG.Config-DB-Settings
[s] << |TOML.Load"config.toml"
   [.] .host << .pg.host
   [.] .port << .pg.port
   [.] .username << .pg.user
   [.] .password << .pg.pass
   [.] .database << .pg.dbname
   [.] .application_name << "MyApp v1.0"
   [.] .options << {
   [+]   .search_path: "public,app_schema",
   [+]   .statement_timeout: "30s"
   [+] }
[s][!] !*
{x}
```

### MySQL Specifics

```polyglot
{#} #MySQL.Config-DB-Settings
