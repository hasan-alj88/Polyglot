# Reserved Schema: -DB-Settings
# Database connection configuration schema

version: "0.0.5"
schema_type: reserved
prefix: "-DB-Settings"
status: stable
last_updated: "2026-01-02"

---

## Schema Definition

name: -DB-Settings
category: database
type: schema
description: |
  Standard database connection configuration schema.
  Implementations must provide all required fields.
  Used by database wrappers (W.DB.*) for type-safe configuration.

required_fields:
  - name: host
    type: string
    description: Database server hostname or IP address
    examples:
      - "localhost"
      - "db.example.com"
      - "192.168.1.100"

  - name: port
    type: uint
    description: Database server port number
    examples:
      - 5432  # PostgreSQL
      - 3306  # MySQL
      - 1433  # MSSQL

  - name: username
    type: string
    description: Database authentication username
    examples:
      - "admin"
      - "app_user"
      - "readonly"

  - name: password
    type: string
    description: Database authentication password
    security: sensitive
    notes:
      - Should be loaded from secure configuration
      - Consider using environment variables or secret management

  - name: database
    type: string
    description: Database/schema name to connect to
    examples:
      - "production"
      - "app_db"
      - "analytics"

optional_fields:
  - name: ssl_enabled
    type: bool
    default: false
    description: Enable SSL/TLS encryption for connection

  - name: ssl_ca_cert
    type: path
    description: Path to SSL CA certificate file
    requires: ssl_enabled = true

  - name: connection_timeout
    type: uint
    default: 30000
    description: Connection timeout in milliseconds

  - name: pool_size
    type: uint
    default: 10
    description: Maximum number of connections in pool

  - name: pool_min
    type: uint
    default: 2
    description: Minimum number of connections to maintain

  - name: idle_timeout
    type: uint
    default: 600000
    description: Idle connection timeout in milliseconds (10 minutes)

  - name: application_name
    type: string
    description: Application identifier for connection tracking

  - name: options
    type: serial
    description: Database-specific connection options

---

## Usage Examples

### Basic Configuration

```polyglot
{#} #MyApp.Database-DB-Settings
[A] #MyAppDB

[s] << |TOML.Load"\\FileDir\\config\database.toml"
   [.] .host:string << .connection.host
   [.] .port:uint << .connection.port
   [.] .username:string << .credentials.user
   [.] .password:string << .credentials.pass
   [.] .database:string << .database_name

[s][!] !*
{x}
```

**TOML Configuration:**
```toml
[connection]
host = "localhost"
port = 5432

[credentials]
user = "app_user"
pass = "secure_password"

database_name = "production"
```

### With Optional Fields

```polyglot
{#} #SecureDB.Config-DB-Settings
[A] #SecureDB

[s] << |TOML.Load"\\FileDir\\config\secure_db.toml"
   [.] .host:string << .db.host
   [.] .port:uint << .db.port
   [.] .username:string << .db.user
   [.] .password:string << .db.pass
   [.] .database:string << .db.name
   [.] .ssl_enabled:bool << .db.ssl
   [.] .ssl_ca_cert:path << .db.ca_cert
   [.] .connection_timeout:uint << .db.timeout
   [.] .pool_size:uint << .db.pool_max

[s][!] !*
{x}
```

### Using with Wrapper

```polyglot
{|} |ConnectDatabase
[t] |T.Cli"start"

[<] <config#MyApp.Database << #MyAppDB
[>] >connection-DB-Connection

[w] |W.DB.Postgresql
 |  <settings-DB-Settings#MyAppDB
 |  >db-DB-Connection >> $dbConn

[>] >connection << $dbConn
{x}
```

### Shorthand Syntax

```polyglot
<settings-DB-Settings#MyAppDB
```

Expands to:
```polyglot
<settings-DB-Settings << -DB-Settings#MyAppDB
```

All field values pulled from enum implementing `-DB-Settings` schema.

