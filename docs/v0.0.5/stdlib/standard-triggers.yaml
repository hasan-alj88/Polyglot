# Standard Library Triggers - v0.0.5
# Triggers define pipeline activation conditions

version: "0.0.5"
last_updated: "2026-01-01"

categories:
  cli:
    description: "Command-line interface triggers"
    triggers:
      - name: T.Cli
        signature: |T.Cli"command"
        description: "CLI command trigger"
        usage: |
          [t] |T.Cli"start"
        inputs:
          - name: command
            type: string
            description: "Command name to trigger on"
            inline: true
        outputs:
          - name: args
            type: serial
            description: "Parsed command-line arguments"
            special: "-Input-None"
        notes:
          - "Takes command string directly as inline parameter"
          - "No I/O wiring needed for simple cases"

  filesystem:
    description: "File system event triggers"
    triggers:
      - name: T.Folder.NewFiles
        signature: |T.Folder.NewFiles
        description: "Trigger on new files in folder"
        usage: |
          [t] |T.Folder.NewFiles
           |  <folder:path << #Config.folder
           |  >files:array.path >> <new_files
        inputs:
          - name: folder
            type: path
            description: "Folder to monitor"
        outputs:
          - name: files
            type: array.path
            description: "Array of new file paths"
        polling: true

      - name: T.File.Modified
        signature: |T.File.Modified
        description: "Trigger on file modification"
        inputs:
          - name: path
            type: path
        outputs:
          - name: timestamp
            type: datetime
          - name: path
            type: path
        polling: true

  function:
    description: "Function/callable triggers"
    triggers:
      - name: T.Function
        signature: |T.Function
        description: "Pipeline as callable function"
        usage: |
          {|} |ValidateEmail
          [t] |T.Function
          [<] <email:string
          [>] >isValid:bool
        notes:
          - "Makes pipeline callable from other pipelines"
          - "Inputs/outputs defined by [<] and [>]"
          - "No inline parameters"

      - name: T.Call
        signature: |T.Call
        description: "Direct function call (synchronous)"
        notes:
          - "Similar to T.Function but synchronous invocation"
          - "Used for utility pipelines"

  http:
    description: "HTTP endpoint triggers"
    triggers:
      - name: T.HTTP.Endpoint
        signature: |T.HTTP.Endpoint"route"
        description: "HTTP endpoint trigger"
        usage: |
          [t] |T.HTTP.Endpoint"/api/users"
           |  >request:serial >> <req
        inputs:
          - name: route
            type: string
            inline: true
        outputs:
          - name: request
            type: serial
            description: "HTTP request data (method, headers, body)"

  scheduled:
    description: "Time-based triggers"
    triggers:
      - name: T.Cron
        signature: |T.Cron"expression"
        description: "Cron schedule trigger"
        usage: |
          [t] |T.Cron"0 0 * * *"
           |  >timestamp:datetime >> <trigger_time
        inputs:
          - name: expression
            type: string
            inline: true
            description: "Cron expression"
        outputs:
          - name: timestamp
            type: datetime

      - name: T.Interval
        signature: |T.Interval"duration"
        description: "Recurring interval trigger"
        usage: |
          [t] |T.Interval"5m"
           |  >timestamp:datetime >> <tick
        inputs:
          - name: duration
            type: string
            inline: true
            description: "Interval duration (e.g., '5m', '1h', '30s')"

  message:
    description: "Message queue triggers"
    triggers:
      - name: T.Queue.Message
        signature: |T.Queue.Message
        description: "Message queue trigger"
        inputs:
          - name: queue
            type: string
            description: "Queue name"
        outputs:
          - name: message
            type: serial

trigger_characteristics:
  inline_parameters:
    description: "Simple triggers can take inline string parameters"
    examples:
      - '[t] |T.Cli"start"'
      - '[t] |T.HTTP.Endpoint"/api/users"'
      - '[t] |T.Cron"0 0 * * *"'

  io_wiring:
    description: "Complex triggers use full I/O wiring"
    example: |
      [t] |T.Folder.NewFiles
       |  <folder:path << #Config.folder
       |  >files:array.path >> <new_files

  input_output_flow:
    description: "Trigger outputs wire to pipeline inputs using special syntax"
    patterns:
      - ">output >> <pipeline_input"
      - ">output >> -Input-None (discard)"

notes:
  - "Each pipeline has exactly one trigger [t]"
  - "Simple triggers use inline parameters"
  - "Complex triggers use I/O wiring"
  - "Trigger outputs initialize pipeline inputs"
