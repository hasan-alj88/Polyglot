# Standard Library Operators - v0.0.5
# Pack (~) and Unpack (*) operators for collection manipulation

version: "0.0.5"
last_updated: "2026-01-01"

operator_types:
  unpack:
    symbol: "~"
    marker: "[p]"
    description: "Unpack collections into iteration contexts"
    space_wrapped: true
    usage_pattern: "[p] ~Operator.Name"

  pack:
    symbol: "*"
    marker: "[*]"
    description: "Pack/aggregate iteration results into collections"
    space_wrapped: true
    usage_pattern: "[*] *Operator.Name"

categories:
  iteration:
    description: "Collection iteration operators"
    operators:
      - name: "~ForEach.Array"
        type: unpack
        signature: |
          [p] ~ForEach.Array
           ~  <array << $collection
           ~  >item >> $element
           ~  >index >> $idx
        description: "Iterate over array elements"
        inputs:
          - name: array
            type: array
        outputs:
          - name: item
            description: "Current element"
          - name: index
            type: int
            optional: true
        usage: |
          [p] ~ForEach.Array
           ~  <array << $customers
           ~  >item >> $customer
           ~  >index >> $idx

      - name: "~ForEach.Set"
        type: unpack
        description: "Iterate over set elements"
        inputs:
          - name: set
            type: set
        outputs:
          - name: item
            description: "Current element"

      - name: "~ForEach.Serial"
        type: unpack
        description: "Iterate over serial fields"
        inputs:
          - name: serial
            type: serial
        outputs:
          - name: key
            type: string
          - name: value
            description: "Field value"

  aggregation:
    description: "Pack operators for aggregating results"
    operators:
      - name: "*Into.Array"
        type: pack
        signature: |
          [*] *Into.Array
           *  <item << $result
           *  >array >> $collection
        description: "Collect iteration results into array"
        inputs:
          - name: item
            description: "Item to add"
        outputs:
          - name: array
            type: array
        usage: |
          [p] ~ForEach.Array
           ~  <array << $items
           ~  >item >> $item
            [r] $processed << |Process"{$item}"
            [*] *Into.Array
             *  <item << $processed
             *  >array >> $results

      - name: "*Into.Set"
        type: pack
        description: "Collect unique results into set"
        inputs:
          - name: item
        outputs:
          - name: set
            type: set

      - name: "*Into.Serial"
        type: pack
        description: "Collect key-value pairs into serial"
        inputs:
          - name: key
            type: string
          - name: value
        outputs:
          - name: serial
            type: serial

  mathematical:
    description: "Mathematical aggregation operators"
    operators:
      - name: "*Aggregate.Sum"
        type: pack
        signature: |
          [*] *Aggregate.Sum
           *  <inc << 1
           *  >sum >> $total
        description: "Sum values across iterations"
        inputs:
          - name: inc
            type: number
            description: "Value to add"
        outputs:
          - name: sum
            type: number
        usage: |
          [f] $status ?= -Success
             [*] *Aggregate.Sum
              *  <inc << 1
              *  >sum >> $totalSent

      - name: "*Aggregate.Product"
        type: pack
        description: "Multiply values across iterations"
        inputs:
          - name: value
            type: number
        outputs:
          - name: product
            type: number

      - name: "*Aggregate.Average"
        type: pack
        description: "Calculate average of values"
        inputs:
          - name: value
            type: number
        outputs:
          - name: average
            type: number

      - name: "*Aggregate.Min"
        type: pack
        description: "Find minimum value"
        inputs:
          - name: value
            type: number
        outputs:
          - name: min
            type: number

      - name: "*Aggregate.Max"
        type: pack
        description: "Find maximum value"
        inputs:
          - name: value
            type: number
        outputs:
          - name: max
            type: number

      - name: "*Aggregate.Count"
        type: pack
        description: "Count iterations"
        outputs:
          - name: count
            type: int

  string:
    description: "String aggregation operators"
    operators:
      - name: "*String.Concat"
        type: pack
        description: "Concatenate strings"
        inputs:
          - name: str
            type: string
          - name: separator
            type: string
            optional: true
        outputs:
          - name: result
            type: string

      - name: "*String.Lines"
        type: pack
        description: "Join strings with newlines"
        inputs:
          - name: line
            type: string
        outputs:
          - name: text
            type: string

nesting_rules:
  unpack_context:
    description: "Content indented under [p] is iteration body"
    example: |
      [p] ~ForEach.Array
       ~  <array << $items
       ~  >item >> $item
        [r] $result << |Process"{$item}"
        [*] *Into.Array
         *  <item << $result
         *  >array >> $results

  pack_inside_unpack:
    description: "Pack operators typically used inside unpack context"
    note: "Pack aggregates results from each iteration"

  multiple_packs:
    description: "Multiple pack operators can coexist in same iteration"
    example: |
      [p] ~ForEach.Array
       ~  <array << $data
       ~  >item >> $item
        [f] $item.valid ?= -True
           [*] *Aggregate.Sum
            *  <inc << 1
            *  >sum >> $validCount
           [*] *Into.Array
            *  <item << $item
            *  >array >> $validItems

operator_characteristics:
  space_wrapping:
    description: "Operators use space-wrapped symbols"
    examples:
      - " ~ " - unpack operator
      - " * " - pack operator

  io_pattern:
    description: "Both use similar I/O wiring pattern"
    pattern: |
      [operator] operator_prefix Operator.Name
       prefix  <input << source
       prefix  >output >> target

notes:
  - "Unpack operators create iteration contexts"
  - "Pack operators aggregate results within iterations"
  - "Multiple pack operators can run in same iteration"
  - "Operators are space-wrapped for visual clarity"
