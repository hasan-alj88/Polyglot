topic: Operators Reference
kw: [operators, <<, >>, <~, =?, >?, <?, comparison, assignment, push, pull, default, conditional]
sum: Complete operator ref: assignment (<<), default (<~), pull (>>), comparison (=? >? <? >=? <=?), range ops (?[a,b) ?(a,b]), unpack (~*), pack (~Y.*)
pts:
  - << PUSH assignment (right-to-left data flow)
  - >> PULL result (left-to-right data flow)
  - <~ DefaultReady (can override once)
  - Comparison: =? >? <? >=? <=? !?
  - Range: ?[a,b] closed, ?[a,b) half-open, ?(a,b] half-open, ?(a,b) open
  - Unpack: ~* expand collection to items
  - Pack: ~Y.* collect items to collection
  - Pipeline: | prefix for pipeline calls
  - State-aware: ops trigger state transitions
