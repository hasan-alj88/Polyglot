sum: Parallel execution with [p] block, ~ForEach unpack, [Y] join/sync; fork-join patterns, result collection via ~Y.*
pts:
  - Launch: [p] ~ForEach for parallel iteration
  - Unpack: ~* expand collection to parallel items
  - Join: [Y] ~Y.IntoArray synchronize and collect
  - Pack: ~Y.* collect results back to collection
  - Execution: all items process concurrently
  - State: waits for all Ready before join
  - Error: any Faulted propagates to result
