name: Documentation Link Validation

on:
  # Run on pull requests that change markdown files
  pull_request:
    paths:
      - 'docs/**/*.md'
      - '**.md'

  # Run on pushes to main/dev branches
  push:
    branches:
      - main
      - dev
    paths:
      - 'docs/**/*.md'
      - '**.md'

  # Allow manual trigger
  workflow_dispatch:

  # Run weekly to catch link rot
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC

jobs:
  validate-links:
    name: Validate Documentation Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better diffs

      - name: Check for changed markdown files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files: |
            docs/**/*.md
            **.md

      - name: Run link validator (changed files only)
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "Running link validation on changed files..."
          chmod +x validate_links.sh
          ./validate_links.sh changed

      - name: Run full link validation (scheduled)
        if: github.event_name == 'schedule'
        run: |
          echo "Running full link validation (weekly check)..."
          chmod +x validate_links.sh
          ./validate_links.sh all

      - name: Upload validation results
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: link-validation-results
          path: |
            validation-report.txt
          retention-days: 30

      - name: Comment on PR (if failures)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Link Validation Failed**\n\nSome links in your documentation changes are broken. Please review the validation logs and fix the broken links.\n\nYou can run `./validate_links.sh changed` locally to see the issues.'
            })

  comprehensive-validation:
    name: Comprehensive Documentation Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run comprehensive link scan
        run: |
          echo "Running comprehensive link scan..."
          python3 scan_broken_links.py > validation-report.txt 2>&1 || true

      - name: Upload comprehensive report
        uses: actions/upload-artifact@v3
        with:
          name: comprehensive-validation-report
          path: |
            validation-report.txt
            docs/Audit/checks/missing-files-list-*.txt
          retention-days: 90

      - name: Check link integrity threshold
        run: |
          # Extract broken link count from scan
          broken_links=$(grep "^Broken links:" validation-report.txt | awk '{print $3}' || echo "999")
          threshold=200  # Maximum allowed broken links

          echo "Broken links found: $broken_links"
          echo "Threshold: $threshold"

          if [ "$broken_links" -gt "$threshold" ]; then
            echo "❌ Link integrity degraded! Broken links ($broken_links) exceed threshold ($threshold)"
            exit 1
          else
            echo "✅ Link integrity maintained! Broken links ($broken_links) under threshold ($threshold)"
          fi

  link-health-report:
    name: Generate Link Health Report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: comprehensive-validation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download validation report
        uses: actions/download-artifact@v3
        with:
          name: comprehensive-validation-report

      - name: Generate health metrics
        run: |
          echo "# Weekly Link Health Report" > link-health-report.md
          echo "" >> link-health-report.md
          echo "**Date:** $(date +%Y-%m-%d)" >> link-health-report.md
          echo "**Generated by:** Automated CI/CD" >> link-health-report.md
          echo "" >> link-health-report.md

          # Extract metrics from validation report
          if [ -f validation-report.txt ]; then
            echo "## Metrics" >> link-health-report.md
            echo "" >> link-health-report.md
            grep -E "^(Scanned|Total links|Broken links):" validation-report.txt >> link-health-report.md || true
          fi

          echo "" >> link-health-report.md
          echo "---" >> link-health-report.md
          echo "*Auto-generated by Documentation Link Validation workflow*" >> link-health-report.md

      - name: Create Issue (if degraded)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('link-health-report.md', 'utf8');

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Weekly Link Health Report - Degradation Detected',
              body: report,
              labels: ['documentation', 'automated', 'link-health']
            })
